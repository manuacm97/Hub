.ic{width:1em;height:1em;display:inline-block;vertical-align:-.15em;flex:none;stroke-width:1.6}

.ct{padding:14px 14px 4px;max-width:560px;margin:0 auto}
.card{background:var(--s1);border-radius:var(--r);padding:15px;margin-bottom:10px;border:1px solid var(--border)}

<script>
'use strict';
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const SK='bh7';
function defS(){return{
  budget:{iniziale:0,adj:[]},
  mas:[
    {id:0,name:'Masaniello 1',p:{B:50,N:10,V:6,Q:1.80},ev:[],stato:'config',B0:50,runId:null,pendingQ:null},
    {id:1,name:'Masaniello 2',p:{B:50,N:10,V:6,Q:1.80},ev:[],stato:'config',B0:50,runId:null,pendingQ:null}
  ],
  sc:{p:{B:10,N:10,Q:1.50},steps:[],stato:'config',B0:10,runId:null,pendingQ:null},
  fb:{bets:[]}
};}
let S=defS(),AT='bud';
// Stato di apertura delle sezioni a comparsa (transiente, non salvato)
let OPEN={};
function setFold(id,open){OPEN[id]=open;}
function load(){try{const d=localStorage.getItem(SK);if(d)S=JSON.parse(d);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

// ══════════════════════════════════════════
//  MASANIELLO MATH
//  r[v][n] = Q·r[v-1][n-1]·r[v][n-1] / (r[v][n-1]+(Q-1)·r[v-1][n-1])
//  Base: r[0][n]=1, r[v][v]=Q^v
//  Stake = cassa · (1 - r[v][n]/r[v][n-1])
// ══════════════════════════════════════════
const RC={};
function buildR(N,V,Q){
  const k=`${N}_${V}_${Q.toFixed(3)}`;
  if(RC[k])return RC[k];
  const r=Array.from({length:V+1},()=>new Array(N+1).fill(0));
  for(let n=0;n<=N;n++)r[0][n]=1;
  for(let v=1;v<=V;v++){
    for(let n=1;n<=N;n++){
      if(v>n){r[v][n]=0;continue;}
      if(v===n){r[v][n]=Math.pow(Q,v);continue;}
      const a=r[v-1][n-1],b=r[v][n-1];
      r[v][n]=(a>0&&b>0)?Q*a*b/(b+(Q-1)*a):0;
    }
  }
  RC[k]=r;return r;
}
function sRatio(r,n,v){
  if(v<=0||n<=0||v>n)return 0;
  if(n===v)return 1;
  const rn=r[v][n],rn1=r[v][n-1];
  return(!rn||!rn1)?1:Math.max(0,1-rn/rn1);
}
// FORMULA CORRETTA del Masaniello con quota variabile:
// S = C * (r[v][n-1] - r[v-1][n-1]) / (r[v][n-1] + (Q-1) * r[v-1][n-1])
// Garantisce che WIN e LOSS preservino entrambi lo stesso target T = C * r[v][n]
// Verifica: con Q=Q_media equivale a sRatio; con Q variabile ricalcola correttamente
function stakeForQ(r,n,v,C,Qact){
  if(v<=0||n<=0||v>n)return 0;
  if(n===v)return C; // last event: all in
  if(!Qact||Qact<=1)return 0;
  const rVN1=r[v][n-1];       // r[v][n-1]
  const rV1N1=r[v-1][n-1];    // r[v-1][n-1]
  const denom=rVN1+(Qact-1)*rV1N1;
  if(!denom||denom<=0)return C*sRatio(r,n,v);
  return Math.max(0,C*(rVN1-rV1N1)/denom);
}
// Recompute cassa from scratch (deterministic)
function recomp(m){
  const r=buildR(m.p.N,m.p.V,m.p.Q);
  let C=m.B0,W=0;
  for(let i=0;i<m.ev.length;i++){
    const e=m.ev[i],nR=m.p.N-i,vR=m.p.V-W;
    const stk=stakeForQ(r,nR,vR,C,e.q); // usa quota reale
    e.stk=stk;e.C0=C; // aggiorna per display
    C=e.esito==='W'?C-stk+stk*e.q:C-stk;
    e.Cd=C;
    if(e.esito==='W')W++;
  }
  return{C,W,r};
}

// ══════════════════════════════════════════
//  BUDGET
// ══════════════════════════════════════════
function budTot(){
  let t=S.budget.iniziale;
  S.budget.adj.forEach(a=>t+=a.v);
  // Puntata tolta subito; vincita (90%) aggiunta solo se vinta
  S.fb.bets.forEach(b=>{t-=b.p;if(b.esito==='W')t+=b.p*b.q;});
  return t;
}
function rageSaldo(){return 0;}
// Somma "bloccata" nei masaniello non ancora trasferiti
function masLocked(){
  let t=0;
  S.mas.forEach((m,i)=>{
    if(m.stato==='config')return;
    const transferred=m.runId&&S.budget.adj.some(a=>a.ref===`mf${i}_${m.runId}`);
    if(!transferred)t+=recomp(m).C;
  });
  return t;
}
// Somma "bloccata" nella scalata (cassa corrente non ancora trasferita)
function scLocked(){
  const sc=S.sc;
  if(!sc||sc.stato==='config')return 0;
  const transferred=sc.runId&&S.budget.adj.some(a=>a.ref===`sf_${sc.runId}`);
  if(transferred)return 0;
  return scCassa();
}
// Budget globale = liquido + masaniello + scalata
function budGlobal(){return budTot()+masLocked()+scLocked();}

// ══════════════════════════════════════════
//  FORMAT
// ══════════════════════════════════════════
function fe(v,d=2){
  if(v===null||v===undefined||isNaN(v))return'—';
  return(v<0?'-€':'€')+Math.abs(v).toFixed(d).replace('.',',');
}
function fd(iso){return iso?new Date(iso).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,4)}
function addAdj(tipo,v,desc,ref){S.budget.adj.push({id:uid(),tipo,v,t:new Date().toISOString(),desc,ref});}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function go(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  document.querySelector('.nav-btn[data-t="'+tab+'"]').classList.add('on');
  AT=tab;draw();
}
function draw(){
  renderHdr();
  if(AT==='bud')renderBud();
  else if(AT==='m0')renderMas(0);
  else if(AT==='m1')renderMas(1);
  else if(AT==='sc')renderSc();
  else if(AT==='fb')renderFb();
}

function buildOverview(){
  let h='<div style="margin-bottom:4px"><div class="card-lbl" style="margin:14px 0 8px 0">Panoramica</div>';
  h+='<div class="ov-grid">';
  for(let idx=0;idx<2;idx++){
    const m=S.mas[idx];
    if(m.stato==='config'){
      h+=`<div class="ov-card" onclick="go('m${idx}')">
        <div class="ov-head"><span class="ov-lbl">${m.name}</span></div>
        <div class="ov-num" style="color:var(--dim);font-size:15px">Non avviato</div>
      </div>`;
    }else{
      const{C,W,r}=recomp(m);
      const played=m.ev.length,nRem=m.p.N-played,vRem=m.p.V-W;
      const diff=C-m.B0,pct=Math.min(100,played/m.p.N*100);
      const stkNext=(m.stato==='attivo'&&vRem>0&&nRem>=vRem)?stakeForQ(r,nRem,vRem,C,m.p.Q):0;
      const lb=m.stato==='attivo'?'sa':m.stato==='finito'?'sf':'sx';
      const ic=m.stato==='attivo'?'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="currentColor"/></svg>':m.stato==='finito'?'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>':'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m9 9 6 6"/><path d="m15 9-6 6"/></svg>';
      h+=`<div class="ov-card ${C>=m.B0?'card-pos':'card-neg'}" onclick="go('m${idx}')">
        <div class="ov-head"><span class="ov-lbl">${m.name}</span><span class="sbdg ${lb}" style="font-size:9px">${ic}</span></div>
        <div class="ov-num ${C>=m.B0?'gradg':'gradr'}">${fe(C)}</div>
        <div class="ov-sub">${diff>=0?'+':''}${fe(diff)} <span style="color:${C>=m.B0?'var(--pos)':'var(--neg)'}">(${diff>=0?'+':''}${m.B0>0?(diff/m.B0*100).toFixed(1):0}%)</span> · ${W}V ${played-W}P</div>
        <div class="prog-bar" style="margin:5px 0 2px"><div class="prog-fill" style="width:${pct}%;background:${C>=m.B0?'var(--pos)':'var(--accent)'}"></div></div>
        ${stkNext>0?`<div class="ov-sub">Next: <strong style="color:var(--accent)">${fe(stkNext)}</strong></div>`:''}
      </div>`;
    }
  }
  h+='</div>';
  h+='<div class="ov-grid">';
  const sc=S.sc;
  if(sc.stato==='config'){
    h+=`<div class="ov-card ov-full" onclick="go('sc')">
      <div class="ov-head"><span class="ov-lbl"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17 10 11l3 3 7-7"/><path d="M15 7h5v5"/></svg> Scalata</span></div>
      <div class="ov-num" style="color:var(--dim);font-size:15px">Non avviata</div>
    </div>`;
  }else{
    const C=scCassa(),done=sc.steps.filter(s=>s.esito!==null).length;
    const pct=done/sc.p.N*100,mult=sc.B0>0?(C/sc.B0):0;
    const lb=sc.stato==='attivo'?'sa':sc.stato==='finita'?'sf':'sx';
    const ic=sc.stato==='attivo'?'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="currentColor"/></svg>':sc.stato==='finita'?'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>':'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m9 9 6 6"/><path d="m15 9-6 6"/></svg>';
    h+=`<div class="ov-card ov-full" onclick="go('sc')">
      <div class="ov-head"><span class="ov-lbl"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17 10 11l3 3 7-7"/><path d="M15 7h5v5"/></svg> Scalata</span><span class="sbdg ${lb}" style="font-size:9px">${ic} ${sc.stato.toUpperCase()}</span></div>
      <div style="display:flex;align-items:flex-end;gap:14px">
        <div><div class="ov-num ${C>=sc.B0?'pos':'neg'}">${fe(C)}</div>
        <div class="ov-sub">${done}/${sc.p.N} step · ×${mult.toFixed(2)} <span style="color:${C>=sc.B0?'var(--pos)':'var(--neg)'}">(${sc.B0>0?((C-sc.B0)/sc.B0*100).toFixed(1):0}%)</span></div></div>
        <div style="flex:1"><div class="prog-bar" style="margin:0 0 3px"><div class="prog-fill" style="width:${pct}%;background:var(--pos)"></div></div>
        <div class="ov-sub">Target: ${fe(sc.B0*Math.pow(sc.p.Q,sc.p.N))}</div></div>
      </div>
    </div>`;
  }
  h+='</div>';
  const bets=S.fb.bets;
  const pending=bets.filter(b=>b.esito===null);
  const won=bets.filter(b=>b.esito==='W'),lost=bets.filter(b=>b.esito==='L');
  const net=won.reduce((a,b)=>a+b.p*b.q,0)-bets.reduce((a,b)=>a+b.p,0);
  const pendStk=pending.reduce((a,b)=>a+b.p,0);
  h+='<div class="ov-grid">';
  h+=`<div class="ov-card ov-full" onclick="go('fb')">
    <div class="ov-head"><span class="ov-lbl"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="4"/><circle cx="9" cy="9" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="15" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="9" r="1.2" fill="currentColor" stroke="none"/><circle cx="9" cy="15" r="1.2" fill="currentColor" stroke="none"/></svg> Free Bet</span>${pending.length>0?`<span class="sbdg sa" style="font-size:9px"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> ${pending.length} in attesa</span>`:''}</div>`;
  if(!bets.length){
    h+=`<div class="ov-num" style="color:var(--dim);font-size:15px">Nessuna scommessa</div>`;
  }else{
    h+=`<div style="display:flex;gap:16px;flex-wrap:wrap">
      <div><div class="ov-num ${net>=0?'pos':'neg'}" style="font-size:20px">${fe(net)}</div>
      <div class="ov-sub">net · ${won.length}V / ${lost.length}P${bets.length>0?' · <span style="color:'+(net>=0?'var(--pos)':'var(--neg)')+'">'+((net/Math.max(0.01,bets.reduce((a,b)=>a+b.p,0)))*100).toFixed(1)+'% ROI</span>':''}</div></div>
      ${pendStk>0?`<div><div class="ov-num acc" style="font-size:20px">${fe(pendStk)}</div><div class="ov-sub">in gioco</div></div>`:''}
    </div>`;
  }
  h+=`</div></div></div>`;
  return h;
}

    h+=`<div class="card ${C>=m.B0?'card-pos':'card-neg'}"><div class="card-lbl">Stato</div>

      h+=`<div class="card"><div class="card-lbl">Gestione</div>
      <div class="btn-row">
        <button class="btn btn-pos btn-sm" onclick="finMas(${idx})"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg> Finito & Trasferisci</button>
        <button class="btn btn-neg btn-sm" onclick="falMas(${idx})"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m9 9 6 6"/><path d="m15 9-6 6"/></svg> Fallito</button>
      </div></div>`;
    }

    const rid=m.runId;
    const hasFin=rid&&S.budget.adj.some(a=>a.ref===`mf${idx}_${rid}`);
    if((isFin||isFal)&&!hasFin){
      h+=`<div class="alert aw">Non ancora trasferito.
      <div style="margin-top:8px"><button class="btn btn-acc btn-sm" onclick="xferMas(${idx})"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.4"/><path d="M6.5 9.5h0"/><path d="M17.5 14.5h0"/></svg> Trasferisci ${fe(C)}</button></div></div>`;
    }
    if(hasFin)h+=`<div class="alert ap"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg> Trasferito al budget.</div>`;

    // TABELLA
    h+=masTable(idx,m,r,C,W);
  }

  ct.innerHTML=h;
  if(isC)setTimeout(()=>mPrev(idx),0);
}

function masTable(idx,m,r,cassaFin,winsTotal){
  // cassaFin = cassa corrente da recomp() - CORRETTA (dipende dalle quote reali)
  // winsTotal = wins totali da recomp()
  const isA=m.stato==='attivo';
  const nextIdx=m.ev.length;
  let W=0; // per calcolare vR delle righe future

  let h=`<div class="card"><div class="card-lbl">Tabella Giocate</div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Modifica quota → stake aggiornato. <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h8"/><path d="M15.5 4.5a2 2 0 0 1 3 3L8 18l-4 1 1-4z"/></svg> per annullare e reinserire una giocata.</div>
  <div class="tbl-wrap"><table class="tbl">
  <thead><tr><th>#</th><th>Quota</th><th>Stake</th><th>Vincita</th><th>Cassa</th><th>Esito</th></tr></thead>
  <tbody>`;

  for(let i=0;i<m.p.N;i++){
    const ev=m.ev[i];
    const isNext=isA&&i===nextIdx;

    if(ev){
      // ── RIGA SETTLED: usa valori da recomp() (ev.stk dipende dalla quota reale!) ──
      const vincita=ev.esito==='W'?ev.stk*ev.q:0;
      const cls=ev.esito==='W'?'rw':'rl';
      h+=`<tr class="${cls}">
        <td style="color:var(--muted);font-size:11px">#${i+1}</td>
        <td><input class="qt" type="number" value="${ev.q}" step="0.01" min="1.01"
          onchange="editEvQ(${idx},${i},parseFloat(this.value))"></td>
        <td style="font-weight:600">${fe(ev.stk)}</td>
        <td style="color:var(--pos)">${ev.esito==='W'?fe(vincita):'—'}</td>
        <td style="font-weight:700">${fe(ev.Cd)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:3px;justify-content:center">
            <span class="bdg ${ev.esito==='W'?'bw':'bl'}">${ev.esito}</span>
            <button class="btn btn-ghost btn-xs" style="font-size:10px;padding:2px 5px" onclick="editEv(${idx},${i})"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h8"/><path d="M15.5 4.5a2 2 0 0 1 3 3L8 18l-4 1 1-4z"/></svg></button>
          </div>
        </td>
      </tr>`;
      if(ev.esito==='W')W++;

    }else if(isNext){
      // ── RIGA PROSSIMA: usa cassaFin (cassa CORRENTE da recomp) ──
      const C=cassaFin;
      const vR=m.p.V-winsTotal,nR=m.p.N-nextIdx;
      if(vR<=0){
        h+=`<tr class="rn"><td>#${i+1}</td><td colspan="5" style="color:var(--pos);font-weight:700"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v5a5 5 0 0 1-10 0z"/><path d="M7 6H4.5a2 2 0 0 0 0 4H7"/><path d="M17 6h2.5a2 2 0 0 1 0 4H17"/><path d="M9 20h6"/><path d="M12 14v6"/></svg> Obiettivo raggiunto!</td></tr>`;
      }else if(nR<vR){
        h+=`<tr class="rn"><td>#${i+1}</td><td colspan="5" style="color:var(--neg)"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m6 6 12 12"/></svg> Non recuperabile</td></tr>`;
      }else{
        const defQ=m.pendingQ||m.p.Q;
        const stkQ=stakeForQ(r,nR,vR,C,defQ);
        const winC=C-stkQ+stkQ*defQ,lossC=C-stkQ;
        h+=`<tr class="rn">
          <td style="color:var(--accent);font-size:11px;font-weight:700">#${i+1}</td>
          <td><input class="qt" type="number" id="mq${idx}" value="${m.pendingQ!=null?m.pendingQ:defQ}" step="0.01" min="1.01" oninput="S.mas[${idx}].pendingQ=parseFloat(this.value)||m.p.Q;save();mRowPrev(${idx})"></td>
          <td style="font-weight:800;color:var(--accent)" id="mStk${idx}">${fe(stkQ)}</td>
          <td id="mwP${idx}" style="font-size:12px;color:var(--muted)">${fe(stkQ*defQ)}</td>
          <td id="mcP${idx}"><span class="chip-w">W ${fe(winC)}</span> <span class="chip-l">L ${fe(lossC)}</span></td>
          <td>
            <div style="display:flex;gap:3px;justify-content:center">
              <button class="btn btn-pos btn-xs" onclick="regEv(${idx},'W')">W</button>
              <button class="btn btn-neg btn-xs" onclick="regEv(${idx},'L')">L</button>
            </div>
          </td>
        </tr>`;
      }
    }else{
      // ── RIGHE FUTURE ──
      h+=`<tr class="rd">
        <td style="font-size:11px">#${i+1}</td>
        <td>—</td><td>—</td><td>—</td><td>—</td>
        <td style="font-size:10px;color:var(--dim)">in attesa</td>
      </tr>`;
    }
  }
  h+=`</tbody></table></div></div>`;
  return h;
}
function mPrev(idx){
  const el=document.getElementById('mPv'+idx);if(!el)return;
  const B=parseFloat(document.getElementById('m'+idx+'B')?.value)||0;
  const N=parseInt(document.getElementById('m'+idx+'N')?.value)||0;
  const V=parseInt(document.getElementById('m'+idx+'V')?.value)||0;
  const Q=parseFloat(document.getElementById('m'+idx+'Q')?.value)||0;
  if(!B||!N||!V||!Q||V>N||Q<=1||B<=0){el.innerHTML='<div style="font-size:12px;color:var(--dim)">Parametri non validi</div>';return;}
  const r=buildR(N,V,Q),resa=r[V][N],cf=B*resa,g=cf-B;
  const sr=sRatio(r,N,V);
  el.innerHTML=`<div class="g3">
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Resa</div><div style="font-size:22px;font-weight:800;color:var(--accent)">${resa.toFixed(2)}</div></div>
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Cassa Finale</div><div style="font-size:22px;font-weight:800;color:var(--pos)">${fe(cf)}</div></div>
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Guadagno</div><div style="font-size:22px;font-weight:800;${g>=0?'color:var(--pos)':'color:var(--neg)'}">${fe(g)}</div></div>
  </div>
  <div style="margin-top:6px;font-size:12px;color:var(--muted)">Prima stake: <strong style="color:var(--text)">${fe(B*sr)}</strong> · Errori concessi: <strong style="color:var(--text)">${N-V}</strong></div>`;
}

// Live preview riga corrente
function mRowPrev(idx){
  const m=S.mas[idx];
  const q=parseFloat(document.getElementById('mq'+idx)?.value)||(m.pendingQ||m.p.Q);
  const {C,W,r}=recomp(m);
  const nR=m.p.N-m.ev.length,vR=m.p.V-W;
  const stk=stakeForQ(r,nR,vR,C,q); // stake aggiornato per quota reale
  const winC=C-stk+stk*q,lossC=C-stk;
  const sp=document.getElementById('mStk'+idx);
  const wp=document.getElementById('mwP'+idx);
  const cp=document.getElementById('mcP'+idx);
  if(sp)sp.textContent=fe(stk); // aggiorna stake display
  if(wp)wp.innerHTML=fe(stk*q);
  if(cp)cp.innerHTML=`<span class="chip-w">W ${fe(winC)}</span> <span class="chip-l">L ${fe(lossC)}</span>`;
}

function scCassa(){
  let C=S.sc.B0;
  for(const s of S.sc.steps){if(s.esito===null)break;C=s.Cd;}
  return C;
}

function renderSc(){
  const ct=document.getElementById('ct-sc');
  const sc=S.sc,isC=sc.stato==='config',isA=sc.stato==='attivo';
  const isF=sc.stato==='finita',isX=sc.stato==='fallita';
  const C=scCassa();
  const done=sc.steps.filter(s=>s.esito!==null).length;
  const mult=sc.B0>0?C/sc.B0:0;
  const rid=sc.runId;

  let h=`<div class="stitle">Scalata</div>`;
  if(!isC){
    const lb=isF?'finito':isX?'fallito':'attivo';
    const ic=isF?'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>':isX?'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m9 9 6 6"/><path d="m15 9-6 6"/></svg>':'<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="currentColor"/></svg>';
    h+=`<div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span class="sbdg ${isF?'sf':isX?'sx':'sa'}">${ic} ${lb.toUpperCase()}</span>
    </div>`;
  }

  h+=`<div class="card"><div class="card-lbl">Parametri</div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Budget Totale (€)</label><input type="number" id="scB" value="${sc.p.B}" step="0.01" ${!isC?'disabled':''} oninput="scPrev()"></div>
    <div class="ig"><label class="ilbl">Numero Step</label><input type="number" id="scN" value="${sc.p.N}" min="2" max="50" ${!isC?'disabled':''} oninput="scPrev()"></div>
  </div>
  <div class="ig"><label class="ilbl">Quota Media (default step)</label><input type="number" id="scQ" value="${sc.p.Q}" step="0.01" min="1.01" ${!isC?'disabled':''} oninput="scPrev()"></div>`;

  if(isC){
    h+=`<div id="scPv" class="pbox"><div style="font-size:12px;color:var(--muted)">Compila i parametri…</div></div>
    <div class="alert ai" style="font-size:12px;margin-bottom:10px"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 3 20h18z"/><path d="M12 10v5"/><path d="M12 18h.01"/></svg> La cassa iniziale verrà detratta dal budget alla generazione.</div>
    <button class="btn btn-acc btn-full" onclick="genSc()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3 5 13h6l-1 8 8-10h-6z"/></svg> Genera Scalata</button>`;
  }else{
    h+=`<div class="btn-row" style="margin-top:6px">
      <button class="btn btn-ghost btn-sm" onclick="rstSc()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.5-5.8L20 8"/><path d="M20 4v4h-4"/><path d="M20 12a8 8 0 0 1-13.5 5.8L4 16"/><path d="M4 20v-4h4"/></svg> Riconfigura</button>
      ${isX||isF?`<button class="btn btn-acc btn-sm" onclick="newSc()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.5l2.5 5.3 5.8.8-4.2 4 1 5.7L12 16.6 6.9 19.3l1-5.7-4.2-4 5.8-.8z"/></svg> New</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="openSimSc()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v6.5L5 18a2 2 0 0 0 1.8 3h10.4A2 2 0 0 0 19 18l-5-8.5V3"/><path d="M7.5 14h9"/></svg> Simulazione</button>
    </div>`;
  }
  h+=`</div>`;

  if(!isC&&sc.steps.length>0){
    h+=`<div class="card"><div class="card-lbl">Stato</div>
    <div class="bnum ${C>=sc.B0?'pos':'neg'}">${fe(C)}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">Inizio: ${fe(sc.B0)} · Target: ${fe(sc.B0*Math.pow(sc.p.Q,sc.p.N))}</div>
    <div class="prog-bar" style="margin-top:10px"><div class="prog-fill" style="width:${done/sc.p.N*100}%;background:var(--pos)"></div></div>
    <div class="g2" style="margin-top:10px">
      <div class="stat"><div class="stat-lbl">Completati</div><div class="stat-val">${done}/${sc.p.N}</div></div>
      <div class="stat"><div class="stat-lbl">Moltiplicatore</div><div class="stat-val acc">×${mult.toFixed(2)}</div></div>
    </div></div>`;

    if(isA){
      h+=`<div class="card"><div class="card-lbl">Gestione</div>
      <div class="btn-row">
        <button class="btn btn-pos btn-sm" onclick="finSc()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg> Finita & Trasferisci</button>
        <button class="btn btn-neg btn-sm" onclick="falSc()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m9 9 6 6"/><path d="m15 9-6 6"/></svg> Fallita</button>
      </div></div>`;
    }

    const hasFin=rid&&S.budget.adj.some(a=>a.ref===`sf_${rid}`);
    if(isF&&!hasFin&&C>0){
      h+=`<div class="alert aw">Non trasferita.<div style="margin-top:8px"><button class="btn btn-acc btn-sm" onclick="xferSc()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.4"/><path d="M6.5 9.5h0"/><path d="M17.5 14.5h0"/></svg> Trasferisci ${fe(C)}</button></div></div>`;
    }
    if(isX){h+=`<div class="alert an">Scalata fallita. La cassa iniziale è già stata detratta dal budget.</div>`;}
    if(hasFin)h+=`<div class="alert ap"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg> Trasferita al budget.</div>`;

      h+=`<tr class="${cls}">`;
      h+=`<td style="font-size:11px;color:var(--muted)">#${i+1}${s.isCheckpoint?`<br><span style="font-size:9px;color:var(--accent)"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4"/><path d="M5 4h11l-2 3 2 3H5"/></svg></span>`:''}`;

      if(s.esito!==null){

        <td style="font-weight:700">${fe(s.Cd)}${s.isCheckpoint&&s.pr?`<br><span style="font-size:10px;color:var(--accent)">−${fe(s.pr)}</span>`:''}</td>
        <td>
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            <span class="bdg ${s.esito==='W'?'bw':'bl'}">${s.esito}</span>
            <button class="btn btn-ghost btn-xs" style="font-size:10px;padding:2px 6px" onclick="editSt(${i})"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h8"/><path d="M15.5 4.5a2 2 0 0 1 3 3L8 18l-4 1 1-4z"/></svg></button>

        </td>`;
      }else if(isNext){
        const qd=s.q||sc.p.Q;
        const win=cHere*qd,pr=s.pr||0,rim=Math.max(0,win-pr);
        h+=`<td><input class="qt" type="number" id="sq${i}" value="${qd}" step="0.01" min="1.01" oninput="S.sc.steps[${i}].q=parseFloat(this.value)||sc.p.Q;save();scRowPrev(${i})"></td>
        <td style="font-weight:700;color:var(--accent)">${fe(cHere)}</td>
        <td id="swP${i}">${fe(win)}</td>

          <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="display:flex;gap:3px">
              <button class="btn btn-pos btn-xs" onclick="regSt(${i},'W')">W</button>
              <button class="btn btn-neg btn-xs" onclick="regSt(${i},'L')">L</button>
            </div>
            <div style="display:flex;align-items:center;gap:4px;margin-top:3px">
              <button class="btn btn-xs" style="padding:3px 6px;font-size:11px;background:${s.isCheckpoint?'var(--accent)':'var(--s3)'};color:${s.isCheckpoint?'#000':'var(--muted)'};" onclick="togCP(${i})"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4"/><path d="M5 4h11l-2 3 2 3H5"/></svg></button>
              ${s.isCheckpoint?`<input type="number" class="cp-inp" id="cpI${i}" value="${s.pr||''}" placeholder="Preleva €" step="0.01" oninput="S.sc.steps[${i}].pr=parseFloat(this.value)||0;save();scRowPrev(${i})">`:``}
            </div>
          </div>
        </td>`;
      }else{
        h+=`<td>—</td><td style="color:var(--dim)">—</td><td>—</td><td>—</td><td style="font-size:10px;color:var(--dim)">in attesa</td>`;
      }
      h+=`</tr>`;
    }
    h+=`</tbody></table></div></div>`;
  }
  ct.innerHTML=h;
  if(isC)setTimeout(()=>scPrev(),0);
}

function scPrev(){
  const el=document.getElementById('scPv');if(!el)return;
  const B=parseFloat(document.getElementById('scB')?.value)||0;
  const N=parseInt(document.getElementById('scN')?.value)||0;
  const Q=parseFloat(document.getElementById('scQ')?.value)||0;
  if(!B||!N||!Q||Q<=1){el.innerHTML='<div style="font-size:12px;color:var(--dim)">Parametri non validi</div>';return;}
  const tgt=B*Math.pow(Q,N);
  let tbl=`<div class="g2" style="margin-bottom:10px">
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Target finale</div><div style="font-size:20px;font-weight:800;color:var(--pos)">${fe(tgt)}</div></div>
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Guadagno</div><div style="font-size:20px;font-weight:800;color:var(--pos)">${fe(tgt-B)}</div></div>
  </div>
  <div style="overflow-x:auto;border-radius:6px;border:1px solid var(--border)">
  <table style="width:100%;border-collapse:collapse;font-size:12px">
  <thead><tr><th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-weight:700;text-transform:uppercase;font-size:10px">#</th>
  <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-weight:700;text-transform:uppercase;font-size:10px">Puntata</th>
  <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-weight:700;text-transform:uppercase;font-size:10px">Vincita @${Q}</th>
  <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-weight:700;text-transform:uppercase;font-size:10px">Cassa</th></tr></thead><tbody>`;
  let cc=B;
  for(let i=0;i<Math.min(N,20);i++){
    const win=cc*Q;
    tbl+=`<tr><td style="padding:4px 8px;text-align:center;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.04)">${i+1}</td>
    <td style="padding:4px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)">${fe(cc)}</td>
    <td style="padding:4px 8px;text-align:center;color:var(--pos);border-bottom:1px solid rgba(255,255,255,.04)">${fe(win)}</td>
    <td style="padding:4px 8px;text-align:center;font-weight:700;border-bottom:1px solid rgba(255,255,255,.04)">${fe(win)}</td></tr>`;
    cc=win;
  }
  if(N>20)tbl+=`<tr><td colspan="4" style="padding:6px;text-align:center;color:var(--dim);font-size:11px">…+${N-20} step</td></tr>`;
  tbl+=`</tbody></table></div>`;
  el.innerHTML=tbl;
}

function scRowPrev(i){
  const sc=S.sc,s=sc.steps[i];
  const q=parseFloat(document.getElementById('sq'+i)?.value)||sc.p.Q;
  const cHere=i===0?sc.B0:(sc.steps[i-1]?.Cd??sc.B0);
  const win=cHere*q,pr=s.pr||0,rim=Math.max(0,win-pr);
  const wp=document.getElementById('swP'+i),cp=document.getElementById('scP'+i);
  if(wp)wp.innerHTML=fe(win);
  if(cp)cp.innerHTML=`<span class="chip-w">W ${fe(rim)}</span> <span class="chip-l">L €0</span>`;
}

        <span class="chev">▼</span>
      </summary>
      <div style="padding:0 14px 14px">${pendAnte.slice().reverse().map(pendItem).join('')}</div>
    </details>`;

  if(settled.length){
    h+=`<details class="card fold" id="fold-storico" ${OPEN['storico']?'open':''} ontoggle="setFold('storico',this.open)">
      <summary>
        <span class="card-lbl" style="margin-bottom:0">Storico <span style="color:var(--dim);font-weight:500">· ${settled.length} scommesse</span></span>
        <span class="chev">▼</span>
      </summary>
      <div style="padding:0 14px 14px">${settled.slice().reverse().map(settledItem).join('')}</div>
    </details>`;

  if(!bets.length)h+=`<div class="empty"><div style="font-size:32px;margin-bottom:8px"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="4"/><circle cx="9" cy="9" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="15" r="1.2" fill="currentColor" stroke="none"/><circle cx="15" cy="9" r="1.2" fill="currentColor" stroke="none"/><circle cx="9" cy="15" r="1.2" fill="currentColor" stroke="none"/></svg></div>Nessuna free bet registrata</div>`;
  h+=`<div style="height:16px"></div>`;
  document.getElementById('ct-fb').innerHTML=h;
}

function setBud(){S.budget.iniziale=parseFloat(document.getElementById('bInp').value)||0;save();draw();}
function resetAll(){if(!confirm('Resettare TUTTO?'))return;if(!confirm('Sicuro? Tutti i dati verranno persi.'))return;S=defS();save();draw();}
function adjBud(sign){
  const el=document.getElementById('bAdj');
  const v=parseFloat(el?.value)||0;
  if(v<=0){alert('Inserisci una cifra valida (> 0).');return;}

  if(el)el.value='';

}

function genMas(idx){
  const m=S.mas[idx];
  const B=parseFloat(document.getElementById('m'+idx+'B').value)||50;
  const N=parseInt(document.getElementById('m'+idx+'N').value)||10;
  const V=parseInt(document.getElementById('m'+idx+'V').value)||6;
  const Q=parseFloat(document.getElementById('m'+idx+'Q').value)||1.80;
  if(V>N||V<=0||N<=0||Q<=1||B<=0){alert('Parametri non validi');return;}
  const rid=Date.now();
  m.p={B,N,V,Q};m.B0=B;m.ev=[];m.stato='attivo';m.runId=rid;
  addAdj('mas',-B,`${m.name} avviato`,`mg${idx}_${rid}`);
  save();draw();
}

function rstMas(idx){
  if(!confirm('Riconfigurare '+S.mas[idx].name+'?'))return;
  const m=S.mas[idx],rid=m.runId;
  // Rimborso se non ancora trasferito
  if(rid&&!S.budget.adj.some(a=>a.ref===`mf${idx}_${rid}`)){
    const gen=S.budget.adj.find(a=>a.ref===`mg${idx}_${rid}`);
    if(gen)addAdj('mas',Math.abs(gen.v),`${m.name} riconfigura (rimborso)`,`mr${idx}_${rid}`);
  }
  m.stato='config';m.ev=[];m.B0=m.p.B;m.runId=null;
  save();draw();
}

function newStartMas(idx){
  const m=S.mas[idx];
  const {C}=recomp(m);
  if(!confirm(`Preleva ${fe(C)} e ricomincia il ${m.name}?`))return;
  const rid=m.runId;
  addAdj('mas',C,`${m.name} New Start`,`mns${idx}_${rid}_${Date.now()}`);
  m.stato='config';m.ev=[];m.B0=m.p.B;m.runId=null;
  save();draw();
}

function regEv(idx,esito){
  const m=S.mas[idx];
  const q=parseFloat(document.getElementById('mq'+idx)?.value)||m.p.Q;
  if(q<=1){alert('Quota non valida');return;}
  const {C,W,r}=recomp(m);
  const nR=m.p.N-m.ev.length,vR=m.p.V-W;
  const stk=stakeForQ(r,nR,vR,C,q); // stake dipende dalla quota reale
  if(vR<=0){alert('Obiettivo già raggiunto!');return;}
  if(nR<vR){alert('Non recuperabile.');return;}
  if(stk<=0){alert('Stake non calcolabile. Verifica i parametri.');return;}
  const Cd=esito==='W'?C-stk+stk*q:C-stk;
  m.ev.push({esito,q,stk,C0:C,Cd,t:new Date().toISOString()});
  m.pendingQ=null; // reset pending quota for next event
  const W2=m.ev.filter(e=>e.esito==='W').length,p2=m.ev.length;
  const nR2=m.p.N-p2,vR2=m.p.V-W2;
  if(vR2<=0)m.stato='finito';
  else if(nR2<vR2||p2>=m.p.N)m.stato=vR2<=0?'finito':'fallito';
  save();draw();
}

// Annulla evento i e tutti quelli successivi → li si reinserisce
function editEv(idx,i){
  if(!confirm(`Annullare le giocate dal #${i+1} in poi e reinserirle?`))return;
  const m=S.mas[idx],rid=m.runId;
  // Rimuovi trasferimento finale se esiste (si tornerà attivo)
  S.budget.adj=S.budget.adj.filter(a=>a.ref!==`mf${idx}_${rid}`);
  // Tronca eventi dal punto i
  m.ev=m.ev.slice(0,i);
  m.pendingQ=null;
  if(m.stato!=='attivo')m.stato='attivo';
  save();draw();
}

function editEvQ(idx,i,newQ){
  // Just update stored quota, recompute everything
  if(!newQ||newQ<=1){return;}
  S.mas[idx].ev[i].q=newQ;
  // Recompute cassaDopo for this and subsequent events
  const m=S.mas[idx];
  let C=m.B0,W=0,r=buildR(m.p.N,m.p.V,m.p.Q);
  for(let j=0;j<m.ev.length;j++){
    const e=m.ev[j],nR=m.p.N-j,vR=m.p.V-W;
    const stk=stakeForQ(r,nR,vR,C,e.q); // usa quota reale di ogni evento
    e.stk=stk;e.C0=C;
    C=e.esito==='W'?C-stk+stk*e.q:C-stk;
    e.Cd=C;
    if(e.esito==='W')W++;
  }
  save();draw();
}

function finMas(idx){if(!confirm('Segnare finito e trasferire?'))return;S.mas[idx].stato='finito';xferMas(idx);}
function falMas(idx){if(!confirm('Segnare fallito?'))return;S.mas[idx].stato='fallito';save();draw();}
function xferMas(idx){
  const m=S.mas[idx],rid=m.runId;
  if(!rid||S.budget.adj.some(a=>a.ref===`mf${idx}_${rid}`)){alert('Già trasferito!');return;}
  const {C}=recomp(m);
  addAdj('mas',C,`${m.name} → Budget`,`mf${idx}_${rid}`);
  save();draw();
}
function openReset(){
  const m0=S.mas[0],m1=S.mas[1];
  const c0=recomp(m0).C,c1=recomp(m1).C,tot=c0+c1;
  const o=document.createElement('div');o.className='overlay';o.id='rOvl';
  o.innerHTML=`<div class="modal"><div class="mt"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12a8 8 0 0 1 13.5-5.8L20 8"/><path d="M20 4v4h-4"/><path d="M20 12a8 8 0 0 1-13.5 5.8L4 16"/><path d="M4 20v-4h4"/></svg> Riavvia Entrambi</div>
  <div class="alert aw" style="margin-bottom:12px">Cassa totale: <strong>${fe(tot)}</strong></div>
  <div class="ir"><div class="ig"><label class="ilbl">Cassa Mas 1</label><input type="number" id="r0" value="${(tot/2).toFixed(2)}" step="0.01" oninput="rChk(${tot})"></div>
  <div class="ig"><label class="ilbl">Cassa Mas 2</label><input type="number" id="r1" value="${(tot/2).toFixed(2)}" step="0.01" oninput="rChk(${tot})"></div></div>
  <div id="rCD" style="font-size:13px;margin-bottom:10px;font-weight:600"></div>
  <div class="ir"><div class="ig"><label class="ilbl">N/V Mas 1</label><input type="number" id="rN0" value="${m0.p.N}"></div>
  <div class="ig" style="padding-top:21px"><input type="number" id="rV0" value="${m0.p.V}"></div></div>
  <div class="ir"><div class="ig"><label class="ilbl">N/V Mas 2</label><input type="number" id="rN1" value="${m1.p.N}"></div>
  <div class="ig" style="padding-top:21px"><input type="number" id="rV1" value="${m1.p.V}"></div></div>
  <div class="ir"><div class="ig"><label class="ilbl">Q.Media Mas 1</label><input type="number" id="rQ0" value="${m0.p.Q}" step="0.01"></div>
  <div class="ig"><label class="ilbl">Q.Media Mas 2</label><input type="number" id="rQ1" value="${m1.p.Q}" step="0.01"></div></div>
  <div class="btn-row" style="margin-top:6px">
    <button class="btn btn-acc btn-full" onclick="confReset(${tot})"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg> Riavvia</button>
    <button class="btn btn-ghost" onclick="document.getElementById('rOvl').remove()">Annulla</button>
  </div></div>`;
  document.body.appendChild(o);rChk(tot);
}
function rChk(tot){
  const v0=parseFloat(document.getElementById('r0')?.value)||0,v1=parseFloat(document.getElementById('r1')?.value)||0;
  const d=document.getElementById('rCD');if(!d)return;
  const diff=tot-v0-v1;
  d.textContent=`${fe(v0+v1)} / ${fe(tot)} — diff: ${fe(Math.abs(diff))}`;
  d.style.color=Math.abs(diff)<.01?'var(--pos)':'var(--neg)';
}
function confReset(tot){
  const c0=parseFloat(document.getElementById('r0').value)||0,c1=parseFloat(document.getElementById('r1').value)||0;
  if(Math.abs(tot-c0-c1)>.02&&!confirm('Le casse non corrispondono. Continuare?'))return;
  const N0=+document.getElementById('rN0').value,V0=+document.getElementById('rV0').value,Q0=+document.getElementById('rQ0').value;
  const N1=+document.getElementById('rN1').value,V1=+document.getElementById('rV1').value,Q1=+document.getElementById('rQ1').value;
  if(V0>N0||V1>N1){alert('V > N non valido');return;}
  [S.mas[0],S.mas[1]].forEach((m,i)=>{
    const c=i===0?c0:c1,N=i===0?N0:N1,V=i===0?V0:V1,Q=i===0?Q0:Q1,rid=Date.now()+i;
    const old=m.runId;
    // Transfer remaining cassa before reset
    if(old&&!S.budget.adj.some(a=>a.ref===`mf${i}_${old}`)){
      const cc=recomp(m).C;
      addAdj('mas',cc,`${m.name} reset → Budget`,`mf${i}_${old}`);
    }
    m.p={B:c,N,V,Q};m.B0=c;m.ev=[];m.stato='attivo';m.runId=rid;
    addAdj('mas',-c,`${m.name} riavviato`,`mg${i}_${rid}`);
  });
  document.getElementById('rOvl').remove();save();draw();
}

// ══════════════════════════════════════════
//  ACTIONS — SCALATA
// ══════════════════════════════════════════
function genSc(){
  const B=parseFloat(document.getElementById('scB').value)||10;
  const N=parseInt(document.getElementById('scN').value)||10;
  const Q=parseFloat(document.getElementById('scQ').value)||1.50;
  if(B<=0||N<2||Q<=1){alert('Parametri non validi');return;}
  const rid=Date.now();
  S.sc.p={B,N,Q};S.sc.B0=B;S.sc.stato='attivo';S.sc.runId=rid;
  S.sc.steps=Array.from({length:N},(_,i)=>({id:i,q:Q,esito:null,isCheckpoint:false,pr:0,Cp:null,Cd:null}));
  addAdj('sc',-B,`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17 10 11l3 3 7-7"/><path d="M15 7h5v5"/></svg> Scalata avviata`,`sg_${rid}`);
  save();draw();
}
function rstSc(){
  if(!confirm('Riconfigurare la Scalata? (rimborso se non ancora conclusa)'))return;
  const rid=S.sc.runId;
  if(rid&&!S.budget.adj.some(a=>a.ref===`sf_${rid}`)){
    const gen=S.budget.adj.find(a=>a.ref===`sg_${rid}`);
    if(gen)addAdj('sc',Math.abs(gen.v),'<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17 10 11l3 3 7-7"/><path d="M15 7h5v5"/></svg> Scalata riconfigura (rimborso)',`sr_${rid}`);
  }
  S.sc.stato='config';S.sc.steps=[];S.sc.runId=null;
  save();draw();
}
function newSc(){
  // Accept outcome, start fresh (no refund for failed/finished)
  if(!confirm('Avviare una nuova Scalata?'))return;
  S.sc.stato='config';S.sc.steps=[];S.sc.runId=null;
  save();draw();
}
function togCP(i){S.sc.steps[i].isCheckpoint=!S.sc.steps[i].isCheckpoint;if(!S.sc.steps[i].isCheckpoint)S.sc.steps[i].pr=0;save();renderSc();}
function regSt(i,esito){
  const sc=S.sc,s=sc.steps[i];
  const q=parseFloat(document.getElementById('sq'+i)?.value)||sc.p.Q;
  const cHere=i===0?sc.B0:(sc.steps[i-1]?.Cd??sc.B0);
  s.Cp=cHere;s.q=q;
  if(esito==='W'){
    const win=cHere*q;let dopo=win;
    if(s.isCheckpoint&&s.pr>0){
      const p=Math.min(s.pr,win);dopo=Math.max(0,win-p);
      const rid=sc.runId;
      addAdj('sc',p,`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21V4"/><path d="M5 4h11l-2 3 2 3H5"/></svg> Scalata CP #${i+1}`,`sc_cp_${i}_${rid}`);
    }
    s.Cd=dopo;
  }else{
    s.Cd=0;
    sc.stato='fallita';
  }
  s.esito=esito;
  if(esito==='W'&&i===sc.steps.length-1)sc.stato='finita';
  save();draw();
}
function editSt(i){
  if(!confirm(`Rieditare step #${i+1}? Tutti gli step successivi verranno azzerati.`))return;
  const sc=S.sc,rid=sc.runId;
  // Remove checkpoint transfers for steps >= i
  S.budget.adj=S.budget.adj.filter(a=>!a.ref?.match(new RegExp(`sc_cp_(\\d+)_${rid}`))|| parseInt(a.ref.match(/sc_cp_(\d+)/)?.[1]||'0')<i);
  S.budget.adj=S.budget.adj.filter(a=>a.ref!==`sf_${rid}`);
  for(let j=i;j<sc.steps.length;j++){sc.steps[j].esito=null;sc.steps[j].Cp=null;sc.steps[j].Cd=null;}
  sc.stato='attivo';
  save();draw();
}
function finSc(){if(!confirm('Finita e trasferire?'))return;S.sc.stato='finita';xferSc();}
function falSc(){if(!confirm('Fallita? La cassa va a €0.'))return;S.sc.stato='fallita';save();draw();}
function xferSc(){
  const rid=S.sc.runId;
  if(!rid||S.budget.adj.some(a=>a.ref===`sf_${rid}`)){alert('Già trasferita!');return;}
  addAdj('sc',scCassa(),'Scalata → Budget',`sf_${rid}`);
  save();draw();
}

// ══════════════════════════════════════════
//  SIMULAZIONE (non modifica nulla)
// ══════════════════════════════════════════
function closeSim(){const o=document.getElementById('simOvl');if(o)o.remove();}
function openSimMas(idx){
  const m=S.mas[idx];
  const o=document.createElement('div');o.className='overlay';o.id='simOvl';
  o.innerHTML=`<div class="modal"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="mt" style="margin:0"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v6.5L5 18a2 2 0 0 0 1.8 3h10.4A2 2 0 0 0 19 18l-5-8.5V3"/><path d="M7.5 14h9"/></svg> Simulazione — ${m.name}</div><button class="disc" onclick="closeSim()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
  <div class="alert ai" style="font-size:12px;margin-bottom:12px">Calcolo indipendente: non tocca il Masaniello in corso.</div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Cassa (€)</label><input type="number" id="smB" value="${m.p.B}" step="0.01" oninput="simMas()"></div>
    <div class="ig"><label class="ilbl">N Giocate</label><input type="number" id="smN" value="${m.p.N}" min="2" max="50" oninput="simMas()"></div>
  </div>
  <div class="ir">
    <div class="ig"><label class="ilbl">V Vincite</label><input type="number" id="smV" value="${m.p.V}" min="1" oninput="simMas()"></div>
    <div class="ig"><label class="ilbl">Quota Media</label><input type="number" id="smQ" value="${m.p.Q}" step="0.01" min="1.01" oninput="simMas()"></div>
  </div>
  <div id="simPv" class="pbox" style="margin-bottom:12px"></div>
  <button class="btn btn-ghost btn-full" onclick="closeSim()">Chiudi</button>
  </div>`;
  document.body.appendChild(o);simMas();
}
function simMas(){
  const el=document.getElementById('simPv');if(!el)return;
  const B=parseFloat(document.getElementById('smB')?.value)||0;
  const N=parseInt(document.getElementById('smN')?.value)||0;
  const V=parseInt(document.getElementById('smV')?.value)||0;
  const Q=parseFloat(document.getElementById('smQ')?.value)||0;
  if(!B||!N||!V||!Q||V>N||Q<=1||B<=0){el.innerHTML='<div style="font-size:12px;color:var(--neg)">Parametri non validi (richiesti V≤N, Q>1, cassa>0)</div>';return;}
  const r=buildR(N,V,Q),resa=r[V][N],cf=B*resa,g=cf-B,sr=sRatio(r,N,V);
  let rows='',C=B,n=N,v=V,step=1;
  while(v>0&&n>0){
    const stk=stakeForQ(r,n,v,C,Q),win=stk*Q,after=C-stk+win;
    rows+=`<tr><td style="padding:4px 8px;text-align:center;color:var(--muted)">${step}</td>
      <td style="padding:4px 8px;text-align:center">${fe(stk)}</td>
      <td style="padding:4px 8px;text-align:center;color:var(--pos)">${fe(win)}</td>
      <td style="padding:4px 8px;text-align:center;font-weight:700">${fe(after)}</td></tr>`;
    C=after;n--;v--;step++;
  }
  el.innerHTML=`<div class="g3" style="margin-bottom:10px">
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Resa</div><div style="font-size:20px;font-weight:800;color:var(--accent)">${resa.toFixed(2)}</div></div>
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Cassa Finale</div><div style="font-size:20px;font-weight:800;color:var(--pos)">${fe(cf)}</div></div>
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Guadagno</div><div style="font-size:20px;font-weight:800;${g>=0?'color:var(--pos)':'color:var(--neg)'}">${fe(g)}</div></div>
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Prima stake: <strong style="color:var(--text)">${fe(B*sr)}</strong> · Errori concessi: <strong style="color:var(--text)">${N-V}</strong></div>
  <div style="font-size:11px;color:var(--dim);margin-bottom:4px">Percorso vincente (le ${V} vincite necessarie @${Q}):</div>
  <div style="overflow-x:auto;border-radius:6px;border:1px solid var(--border)">
  <table style="width:100%;border-collapse:collapse;font-size:12px">
  <thead><tr>
    <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-size:10px;text-transform:uppercase">Vinc.</th>
    <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-size:10px;text-transform:uppercase">Stake</th>
    <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-size:10px;text-transform:uppercase">Vincita</th>
    <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-size:10px;text-transform:uppercase">Cassa</th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}
function openSimSc(){
  const sc=S.sc;
  const o=document.createElement('div');o.className='overlay';o.id='simOvl';
  o.innerHTML=`<div class="modal"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><div class="mt" style="margin:0"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6"/><path d="M10 3v6.5L5 18a2 2 0 0 0 1.8 3h10.4A2 2 0 0 0 19 18l-5-8.5V3"/><path d="M7.5 14h9"/></svg> Simulazione — Scalata</div><button class="disc" onclick="closeSim()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
  <div class="alert ai" style="font-size:12px;margin-bottom:12px">Calcolo indipendente: non tocca la Scalata in corso.</div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Budget Totale (€)</label><input type="number" id="ssB" value="${sc.p.B}" step="0.01" oninput="simSc()"></div>
    <div class="ig"><label class="ilbl">Numero Step</label><input type="number" id="ssN" value="${sc.p.N}" min="2" max="50" oninput="simSc()"></div>
  </div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Numero Step</label><input type="number" id="ssN" value="${sc.p.N}" min="2" max="50" oninput="simSc()"></div>
    <div class="ig"><label class="ilbl">Quota Media</label><input type="number" id="ssQ" value="${sc.p.Q}" step="0.01" min="1.01" oninput="simSc()"></div>
  </div>
  <div id="simPv" class="pbox" style="margin-bottom:12px"></div>
  <button class="btn btn-ghost btn-full" onclick="closeSim()">Chiudi</button>
  </div>`;
  document.body.appendChild(o);simSc();
}
function simSc(){
  const el=document.getElementById('simPv');if(!el)return;
  const B=parseFloat(document.getElementById('ssB')?.value)||0;
  const N=parseInt(document.getElementById('ssN')?.value)||0;
  const Q=parseFloat(document.getElementById('ssQ')?.value)||0;
  if(!B||!N||!Q||Q<=1||N<2){el.innerHTML='<div style="font-size:12px;color:var(--neg)">Parametri non validi (richiesti N≥2, Q>1)</div>';return;}
  const tgt=B*Math.pow(Q,N);
  let rows='',cc=B;
  for(let i=0;i<Math.min(N,20);i++){
    const win=cc*Q;
    rows+=`<tr><td style="padding:4px 8px;text-align:center;color:var(--muted)">${i+1}</td>
      <td style="padding:4px 8px;text-align:center">${fe(cc)}</td>
      <td style="padding:4px 8px;text-align:center;color:var(--pos)">${fe(win)}</td>
      <td style="padding:4px 8px;text-align:center;font-weight:700">${fe(win)}</td></tr>`;
    cc=win;
  }
  if(N>20)rows+=`<tr><td colspan="4" style="padding:6px;text-align:center;color:var(--dim);font-size:11px">…+${N-20} step</td></tr>`;
  el.innerHTML=`<div class="g2" style="margin-bottom:10px">
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Target finale</div><div style="font-size:20px;font-weight:800;color:var(--pos)">${fe(tgt)}</div></div>
    <div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px">Guadagno</div><div style="font-size:20px;font-weight:800;color:var(--pos)">${fe(tgt-B)}</div></div>
  </div>
  <div style="overflow-x:auto;border-radius:6px;border:1px solid var(--border)">
  <table style="width:100%;border-collapse:collapse;font-size:12px">
  <thead><tr>
    <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-size:10px;text-transform:uppercase">#</th>
    <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-size:10px;text-transform:uppercase">Puntata</th>
    <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-size:10px;text-transform:uppercase">Vincita @${Q}</th>
    <th style="background:var(--s3);padding:5px 8px;color:var(--muted);font-size:10px;text-transform:uppercase">Cassa</th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ══════════════════════════════════════════
//  ACTIONS — FREE BET
// ══════════════════════════════════════════
function fbPrev(){
  const p=parseFloat(document.getElementById('fbP')?.value)||0;
  const q=parseFloat(document.getElementById('fbQ')?.value)||0;
  const el=document.getElementById('fbPv');
  if(el&&p>0&&q>1)el.innerHTML=`Vincita potenziale: <strong class="pos">${fe(p*q)}</strong> (netto: ${fe(p*q-p)})`;
  else if(el)el.textContent='';
}
function addFb(){
  const p=parseFloat(document.getElementById('fbP').value)||0;
  const q=parseFloat(document.getElementById('fbQ').value)||0;
  const desc=(document.getElementById('fbD')?.value||'').trim();
  const antepost=document.getElementById('fbAbtn')?.classList.contains('on')||false;
  if(!p||p<=0||!q||q<=1){alert('Inserisci puntata e quota valide');return;}
  S.fb.bets.push({id:uid(),p,q,esito:null,t:new Date().toISOString(),desc,antepost});
  save();draw();
}
function editFbDesc(id){
  const b=S.fb.bets.find(b=>b.id===id);if(!b)return;
  const v=prompt('Descrizione scommessa:',b.desc||'');
  if(v===null)return;
  b.desc=v.trim();save();draw();
}
function toggleFbAnte(id){
  const b=S.fb.bets.find(b=>b.id===id);if(!b)return;
  b.antepost=!b.antepost;save();draw();
}
function undoFb(id){
  const b=S.fb.bets.find(b=>b.id===id);if(!b)return;
  b.esito=null;b.st=null;save();draw();
}
function setFb(id,esito){const b=S.fb.bets.find(b=>b.id===id);if(!b)return;b.esito=esito;b.st=new Date().toISOString();save();draw();}
function delFb(id){if(!confirm('Eliminare questa scommessa?'))return;S.fb.bets=S.fb.bets.filter(b=>b.id!==id);save();draw();}

// ══════════════════════════════════════════
//  EXPORT / IMPORT
// ══════════════════════════════════════════
function expJ(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`bethub_${new Date().toISOString().slice(0,10)}.json`;a.click();}
function impJ(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(!p.budget)throw new Error('File non valido');if(confirm('Sovrascrivere?')){S=p;save();draw();}}catch(err){alert('Errore: '+err.message);}};r.readAsText(f);e.target.value='';}
function expC(){
  let c='Sezione,N,Stake,Quota,Esito,Vincita,Cassa Dopo,Data\n';
  S.mas.forEach((m,i)=>m.ev.forEach((e,j)=>{const v=e.esito==='W'?e.stk*e.q:0;c+=`Mas${i+1},${j+1},${e.stk?.toFixed(2)},${e.q},${e.esito},${v.toFixed(2)},${e.Cd?.toFixed(2)},${e.t||''}\n`;}));
  S.sc.steps.forEach((s,i)=>{if(s.esito){const v=s.esito==='W'?(s.Cp*s.q).toFixed(2):'0';c+=`Scalata,${i+1},${s.Cp?.toFixed(2)},${s.q},${s.esito},${v},${s.Cd?.toFixed(2)},\n`;}});
  S.fb.bets.forEach(b=>{if(b.esito){const n=b.esito==='W'?(b.p*b.q-b.p).toFixed(2):(-b.p).toFixed(2);c+=`FreeBet,,${b.p.toFixed(2)},${b.q},${b.esito},,${n},${b.t||''}\n`;}});
  const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`bethub_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

load();draw();

(function(){
  const isIosStandalone=navigator.standalone===true;
  if('serviceWorker' in navigator && !isIosStandalone){
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
})();
