<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c12">
<title>BetHub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c12;--s1:#161620;--s2:#1e1e2a;--s3:#272733;
  --text:#eceaf5;--muted:#7c7a90;--dim:#3c3a50;
  --accent:#f5a623;--acc-d:rgba(245,166,35,0.13);
  --pos:#3ecf8e;--pos-d:rgba(62,207,142,0.13);
  --neg:#e05c5c;--neg-d:rgba(224,92,92,0.13);
  --rage:#a259ff;--rage-d:rgba(162,89,255,0.13);
  --border:rgba(255,255,255,0.08);--r:14px;--r-s:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,'SF Pro Text',sans-serif;font-size:15px;line-height:1.4;min-height:100vh;padding-bottom:74px;-webkit-font-smoothing:antialiased;letter-spacing:-.01em}
/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(12,12,18,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr-logo{font-size:17px;font-weight:900;letter-spacing:-.5px;color:var(--accent);flex-shrink:0;display:flex;align-items:center;gap:6px}
.hdr-bud{text-align:right}
.hdr-bud-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.hdr-bud-val{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1}
/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(22,22,32,.98);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;height:64px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--dim);font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:none;background:none;padding:0;transition:color .2s}
.nav-btn.on{color:var(--accent)}
.nav-ico{font-size:20px;line-height:1}
/* TABS */
.tab{display:none}.tab.on{display:block}
/* CONTENT */
.ct{padding:14px 14px 4px;max-width:560px;margin:0 auto}
/* CARDS */
.card{background:var(--s1);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
/* BIG NUM */
.bnum{font-size:36px;font-weight:800;letter-spacing:-1.5px;line-height:1.05}
.pos{color:var(--pos)}.neg{color:var(--neg)}.acc{color:var(--accent)}.rage-c{color:var(--rage)}
/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:var(--s2);border-radius:var(--r-s);padding:10px 12px}
.stat-lbl{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:2px}
.stat-val{font-size:17px;font-weight:700}
/* INPUTS */
.ilbl{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;letter-spacing:.02em}
input,select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-s);color:var(--text);padding:10px 12px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--accent);background:var(--s3)}
.ig{margin-bottom:10px}
.ir{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ir3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:11px 16px;border-radius:var(--r-s);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s,transform .1s;white-space:nowrap;font-family:inherit;letter-spacing:-.2px}
.btn:active{opacity:.8;transform:scale(.97)}
.btn-acc{background:var(--accent);color:#0c0c12}
.btn-pos{background:var(--pos);color:#0c0c12}
.btn-neg{background:var(--neg);color:#fff}
.btn-ghost{background:var(--s2);color:var(--text);border:1px solid var(--border)}
.btn-rage{background:var(--rage);color:#fff}
.btn-warn{background:#e8a225;color:#0c0c12}
.btn-sm{padding:7px 12px;font-size:13px}
.btn-xs{padding:5px 9px;font-size:12px;font-weight:700}
.btn-full{width:100%;display:flex}
.btn-row{display:flex;gap:7px;flex-wrap:wrap}
/* PROGRESS */
.prog-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
/* ALERTS */
.alert{padding:11px 13px;border-radius:var(--r-s);font-size:13px;margin-bottom:10px;line-height:1.5;font-weight:500}
.alert-warn{background:var(--acc-d);border:1px solid rgba(245,166,35,.3);color:var(--accent)}
.alert-pos{background:var(--pos-d);border:1px solid rgba(62,207,142,.35);color:var(--pos)}
.alert-neg{background:var(--neg-d);border:1px solid rgba(224,92,92,.35);color:var(--neg)}
.alert-rage{background:var(--rage-d);border:1px solid rgba(162,89,255,.4);color:var(--rage)}
.alert-info{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted)}
/* EVENT LIST */
.ev-list{display:flex;flex-direction:column;gap:5px;margin-top:8px;max-height:52vh;overflow-y:auto;padding-right:2px}
.ev-item{display:flex;flex-direction:column;background:var(--s2);border-radius:var(--r-s);border:1px solid var(--border);overflow:hidden}
.ev-row{display:flex;align-items:center;gap:7px;padding:9px 10px;min-height:44px}
.ev-preview{padding:7px 10px;background:rgba(0,0,0,.2);border-top:1px solid var(--border);font-size:12px;display:flex;gap:12px;flex-wrap:wrap}
.ev-num{font-size:10px;font-weight:700;color:var(--muted);min-width:22px;flex-shrink:0;letter-spacing:.05em}
.ev-quota-inp{width:72px;padding:6px 8px;font-size:14px;text-align:center;flex-shrink:0;background:var(--s3);border-radius:7px;border:1px solid var(--border);color:var(--text);font-family:inherit}
.ev-quota-inp:focus{border-color:var(--accent);outline:none}
.ev-stake-txt{flex:1;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-actions{display:flex;gap:4px;flex-shrink:0}
.ev-item.ev-win{border-color:rgba(62,207,142,.3);background:rgba(62,207,142,.05)}
.ev-item.ev-win .ev-row{background:rgba(62,207,142,.04)}
.ev-item.ev-loss{border-color:rgba(224,92,92,.3);background:rgba(224,92,92,.05)}
.ev-item.ev-cp{border-color:rgba(245,166,35,.35)}
/* BADGES */
.badge{display:inline-flex;align-items:center;justify-content:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.02em}
.b-win{background:var(--pos-d);color:var(--pos)}
.b-loss{background:var(--neg-d);color:var(--neg)}
.b-acc{background:var(--acc-d);color:var(--accent)}
/* SEP */
.sep{height:1px;background:var(--border);margin:12px 0}
/* RAGE */
.rage-box{background:var(--rage-d);border:1px solid rgba(162,89,255,.5);border-radius:var(--r);padding:14px;margin-bottom:10px}
.rage-lock{text-align:center;padding:20px;background:var(--s2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px}
/* STATUS */
.s-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.s-attivo{background:var(--pos-d);color:var(--pos)}
.s-finito{background:var(--acc-d);color:var(--accent)}
.s-fallito{background:var(--neg-d);color:var(--neg)}
/* PAGE TITLE */
.stitle{font-size:20px;font-weight:800;letter-spacing:-.6px;margin-bottom:14px}
/* TOGGLE */
.tog-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0}
.tog{position:relative;width:38px;height:21px;background:var(--s3);border-radius:11px;flex-shrink:0;border:none;cursor:pointer;transition:background .2s}
.tog::after{content:'';position:absolute;width:15px;height:15px;background:white;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on{background:var(--accent)}.tog.on::after{transform:translateX(17px)}
/* FREEBET */
.fb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s2);border-radius:var(--r-s);margin-bottom:6px;border:1px solid var(--border)}
.fb-info{flex:1;min-width:0}
.fb-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
/* DETAIL ROWS */
.drow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;font-weight:500}
.drow-lbl{color:var(--muted)}.drow-val{font-weight:700}
.drow+.drow{border-top:1px solid var(--border)}
/* RESET PANEL */
.reset-panel{background:var(--acc-d);border:1px solid rgba(245,166,35,.4);border-radius:var(--r);padding:14px;margin-bottom:10px}
/* CHECKPOINT PREVIEW */
.cp-preview{background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.3);border-radius:var(--r-s);padding:10px 12px;margin-top:6px;font-size:12px;line-height:1.6}
/* EMPTY */
.empty{text-align:center;padding:28px 16px;color:var(--muted);font-size:14px}
.cp-badge{display:inline-flex;align-items:center;gap:3px;background:var(--acc-d);color:var(--accent);border-radius:5px;padding:2px 6px;font-size:11px;font-weight:700}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--s1);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:560px;border:1px solid var(--border);border-bottom:none;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;margin-bottom:14px;letter-spacing:-.4px}
/* TRANS LOG */
.trans-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px;gap:8px}
.trans-item+.trans-item{border-top:1px solid var(--border)}
.trans-pos{color:var(--pos);font-weight:700}.trans-neg{color:var(--neg);font-weight:700}
/* MAS FORMULA */
.formula-box{background:var(--s3);border-radius:var(--r-s);padding:8px 12px;font-size:12px;font-weight:600;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums}
.formula-box .f-stake{color:var(--accent);font-size:14px;font-weight:800}
.formula-box .f-dim{color:var(--dim);font-size:11px;margin-left:4px}
/* WIN/LOSS PREVIEW CHIPS */
.preview-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.chip-win{background:var(--pos-d);color:var(--pos)}
.chip-loss{background:var(--neg-d);color:var(--neg)}
/* CP ROW */
.cp-row{padding:8px 10px;background:rgba(245,166,35,.06);border-top:1px solid rgba(245,166,35,.2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-logo">🎯 BetHub</div>
  <div class="hdr-bud">
    <div class="hdr-bud-lbl">Budget</div>
    <div class="hdr-bud-val" id="hdrBud">€0,00</div>
  </div>
</header>
<div id="tab-bud" class="tab on"><div class="ct" id="ct-bud"></div></div>
<div id="tab-m1"  class="tab"><div class="ct" id="ct-m1"></div></div>
<div id="tab-m2"  class="tab"><div class="ct" id="ct-m2"></div></div>
<div id="tab-sc"  class="tab"><div class="ct" id="ct-sc"></div></div>
<div id="tab-fb"  class="tab"><div class="ct" id="ct-fb"></div></div>
<nav class="nav">
  <button class="nav-btn on"  data-tab="bud" onclick="go('bud')"><span class="nav-ico">💰</span>Budget</button>
  <button class="nav-btn"     data-tab="m1"  onclick="go('m1')"><span class="nav-ico">1️⃣</span>Mas 1</button>
  <button class="nav-btn"     data-tab="m2"  onclick="go('m2')"><span class="nav-ico">2️⃣</span>Mas 2</button>
  <button class="nav-btn"     data-tab="sc"  onclick="go('sc')"><span class="nav-ico">📈</span>Scalata</button>
  <button class="nav-btn"     data-tab="fb"  onclick="go('fb')"><span class="nav-ico">🎲</span>Free</button>
</nav>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const SK='bethub_v5';
function defS(){return{
  budget:{iniziale:0,aggiustamenti:[]},
  rageBet:{saldo:0,storico:[]},
  masaniello:[
    {id:0,nome:'Masaniello 1',params:{cassa:50,N:10,V:6,quotaMedia:1.80},events:[],stato:'config',cassaIniziale:50},
    {id:1,nome:'Masaniello 2',params:{cassa:50,N:10,V:6,quotaMedia:1.80},events:[],stato:'config',cassaIniziale:50}
  ],
  scalata:{params:{cassaIniziale:10,numStep:10,quotaMedia:1.50},steps:[],stato:'config',cassaIniziale:10},
  freeBet:{scommesse:[]}
};}
let S=defS(),activeTab='bud';
function load(){try{const d=localStorage.getItem(SK);if(d)S=JSON.parse(d);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

// ═══════════════════════════════════════════════════════
//  MATH - MASANIELLO (Triangolo di Tartaglia)
// ═══════════════════════════════════════════════════════
// C(n,k) = coefficiente binomiale
function C(n,k){
  if(k<0||k>n)return 0;if(k===0||k===n)return 1;
  k=Math.min(k,n-k);let r=1;
  for(let i=0;i<k;i++)r=r*(n-i)/(i+1);
  return Math.round(r);
}

// Stake = Cassa / C(nRim, vRim)
// Questa è la formula corretta del Masaniello basata sul triangolo di Tartaglia
function calcStake(cassa,nRim,vRim){
  if(vRim<=0||nRim<vRim||nRim<=0)return 0;
  const c=C(nRim,vRim);
  return c===0?0:cassa/c;
}

// Calcola la cassa corrente rileggendo tutta la storia degli eventi (deterministico)
function getCassa(m){
  let cassa=m.cassaIniziale,wins=0;
  for(let i=0;i<m.events.length;i++){
    const ev=m.events[i];
    const nR=m.params.N-i,vR=m.params.V-wins;
    const s=calcStake(cassa,nR,vR);
    if(ev.esito==='W'){cassa=cassa-s+s*ev.quota;wins++;}
    else{cassa-=s;}
  }
  return cassa;
}

function masStatus(m){
  const wins=m.events.filter(e=>e.esito==='W').length;
  const played=m.events.length;
  return{wins,losses:played-wins,played,nRim:m.params.N-played,vRim:m.params.V-wins};
}

// Proiezione best/worst rimanenti (usa quota media)
function masProj(m){
  const cassa=getCassa(m);
  const{nRim,vRim}=masStatus(m);
  if(vRim<=0)return{best:cassa,worst:cassa};
  if(nRim<vRim)return{best:0,worst:0};
  const Q=m.params.quotaMedia;
  // Best: tutti win subito
  let bc=cassa,bn=nRim,bv=vRim;
  for(let i=0;i<vRim&&bn>=bv;i++){const s=calcStake(bc,bn,bv);bc=bc-s+s*Q;bn--;bv--;}
  // Worst: prima tutte le perdite poi i win
  let wc=cassa,wn=nRim,wv=vRim;
  for(let i=0;i<nRim-vRim;i++){const s=calcStake(wc,wn,wv);wc-=s;wn--;}
  for(let i=0;i<vRim;i++){const s=calcStake(wc,wn,wv);wc=wc-s+s*Q;wn--;wv--;}
  return{best:bc,worst:wc};
}

// ═══════════════════════════════════════════════════════
//  BUDGET CALCULATIONS
// ═══════════════════════════════════════════════════════
function budTot(){
  let t=S.budget.iniziale;
  for(const a of S.budget.aggiustamenti)t+=a.importo;
  for(const s of S.freeBet.scommesse)if(s.esito!==null){t-=s.puntata;if(s.esito==='W')t+=s.puntata*s.quota*0.90;}
  return t;
}

function rageSaldo(){
  let r=S.rageBet.saldo;
  for(const s of S.freeBet.scommesse)if(s.esito==='W')r+=s.puntata*s.quota*0.10;
  return r;
}

// ═══════════════════════════════════════════════════════
//  FORMAT
// ═══════════════════════════════════════════════════════
function fe(v,dec=2){
  if(v===null||v===undefined||isNaN(v))return'—';
  const s=Math.abs(v).toFixed(dec).replace('.',',');
  return(v<0?'-€':'€')+s;
}
function fd(iso){if(!iso)return'';return new Date(iso).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,4);}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
function go(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+tab).classList.add('on');
  document.querySelector('.nav-btn[data-tab="'+tab+'"]').classList.add('on');
  activeTab=tab;renderAll();
}

// ═══════════════════════════════════════════════════════
//  RENDER HEADER
// ═══════════════════════════════════════════════════════
function renderHeader(){
  const b=budTot(),el=document.getElementById('hdrBud');
  el.textContent=fe(b);el.className='hdr-bud-val '+(b>=0?'pos':'neg');
}

// ═══════════════════════════════════════════════════════
//  BUDGET TAB
// ═══════════════════════════════════════════════════════
function renderBudget(){
  const ct=document.getElementById('ct-bud');
  const bud=budTot(),rage=rageSaldo(),canRage=bud<10;
  const masAdj=S.budget.aggiustamenti.filter(a=>a.tipo==='masaniello'||a.tipo==='scalata');
  const rageAdj=S.budget.aggiustamenti.filter(a=>a.tipo==='rage');
  let fbContr=0;
  for(const s of S.freeBet.scommesse)if(s.esito!==null){fbContr-=s.puntata;if(s.esito==='W')fbContr+=s.puntata*s.quota*.9;}

  let h=`<div class="stitle">Budget Hub</div>
  <div class="card">
    <div class="card-lbl">Budget Totale</div>
    <div class="bnum ${bud>=0?'pos':'neg'}">${fe(bud)}</div>
    <div class="sep"></div>
    <div class="drow"><span class="drow-lbl">Budget iniziale</span><span class="drow-val">${fe(S.budget.iniziale)}</span></div>`;

  if(masAdj.length>0){const t=masAdj.reduce((a,x)=>a+x.importo,0);h+=`<div class="drow"><span class="drow-lbl">Mas/Scalata</span><span class="drow-val ${t>=0?'pos':'neg'}">${fe(t)}</span></div>`;}
  if(rageAdj.length>0){const t=rageAdj.reduce((a,x)=>a+x.importo,0);h+=`<div class="drow"><span class="drow-lbl">Da Rage Bet</span><span class="drow-val pos">${fe(t)}</span></div>`;}
  if(S.freeBet.scommesse.filter(s=>s.esito!==null).length>0){h+=`<div class="drow"><span class="drow-lbl">Free Bet net</span><span class="drow-val ${fbContr>=0?'pos':'neg'}">${fe(fbContr)}</span></div>`;}

  h+=`</div>
  <div class="card">
    <div class="card-lbl">Imposta Budget Iniziale</div>
    <div class="ig"><input type="number" id="budInp" value="${S.budget.iniziale}" step="0.01" placeholder="0.00"></div>
    <button class="btn btn-acc btn-sm" onclick="setBud()">💾 Salva</button>
  </div>`;

  // RAGE BET
  if(canRage){
    h+=`<div class="rage-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div>
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--rage);margin-bottom:3px">🔥 Rage Bet Fund</div>
        <div class="bnum rage-c" style="font-size:30px">${fe(rage)}</div>
      </div>
      <div style="font-size:34px">💀</div>
    </div>
    <div class="alert alert-rage" style="margin-bottom:10px;font-size:12px">Budget sotto €10 — il fondo è sbloccato. Usa con giudizio.</div>
    <div class="ig"><label class="ilbl">Importo da trasferire al budget (max ${fe(rage)})</label>
    <input type="number" id="rageInp" placeholder="0.00" step="0.01" max="${rage.toFixed(2)}"></div>
    <button class="btn btn-rage btn-full" onclick="xferRage()">💸 Trasferisci al Budget</button>
    ${S.rageBet.storico.length>0?`<div class="sep"></div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px">Storico trasferimenti</div>${S.rageBet.storico.slice().reverse().map(t=>`<div class="trans-item"><span style="font-weight:600">${t.nota}</span><span style="font-size:11px;color:var(--muted)">${fd(t.data)}</span><span class="trans-pos">${fe(t.importo)}</span></div>`).join('')}`:''}
    </div>`;
  }else{
    h+=`<div class="rage-lock">
    <div style="font-size:30px;margin-bottom:8px">🔒</div>
    <div style="font-weight:800;color:var(--muted);margin-bottom:4px">Rage Bet Fund</div>
    <div style="font-size:12px;color:var(--dim);margin-bottom:10px">Accessibile solo quando il budget scende sotto €10</div>
    <div style="font-size:14px;color:var(--muted)">Saldo: <strong class="rage-c">████</strong></div>
    </div>`;
  }

  // LOG
  if(S.budget.aggiustamenti.length>0){
    h+=`<div class="card"><div class="card-lbl">Log Trasferimenti</div>
    ${S.budget.aggiustamenti.slice().reverse().slice(0,15).map(a=>`<div class="trans-item">
      <span style="font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.descrizione}</span>
      <span style="font-size:11px;color:var(--muted);flex-shrink:0;padding:0 6px">${fd(a.data)}</span>
      <span class="${a.importo>=0?'trans-pos':'trans-neg'}" style="flex-shrink:0">${fe(a.importo)}</span>
    </div>`).join('')}</div>`;
  }

  h+=`<div class="card"><div class="card-lbl">Esporta / Importa Dati</div>
  <div class="btn-row">
    <button class="btn btn-ghost btn-sm" onclick="expJSON()">📤 JSON</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('impF').click()">📥 Importa</button>
    <button class="btn btn-ghost btn-sm" onclick="expCSV()">📊 CSV</button>
  </div>
  <input type="file" id="impF" accept=".json" style="display:none" onchange="impJSON(event)">
  </div><div style="height:16px"></div>`;

  ct.innerHTML=h;
}

// ═══════════════════════════════════════════════════════
//  MASANIELLO TAB
// ═══════════════════════════════════════════════════════
function renderMas(idx){
  const ct=document.getElementById('ct-m'+idx);
  const m=S.masaniello[idx];
  const isConf=m.stato==='config',isAtt=m.stato==='attivo';
  const isFin=m.stato==='finito',isFal=m.stato==='fallito';
  const st=masStatus(m);
  const cassaCorrente=getCassa(m); // deterministico

  // Check reset condition
  const m0=S.masaniello[0],m1=S.masaniello[1];
  const c0=getCassa(m0),c1=getCassa(m1);
  const showReset=(m0.stato==='attivo'||m1.stato==='attivo')
    &&(c0<m0.cassaIniziale||c1<m1.cassaIniziale)
    &&(c0+c1>=m0.cassaIniziale+m1.cassaIniziale);

  let h=`<div class="stitle">${m.nome}</div>`;

  // Status badge
  if(!isConf){
    const b=isFin?'finito':isFal?'fallito':'attivo';
    const ic=isFin?'✅':isFal?'❌':'🟢';
    h+=`<div style="margin-bottom:10px"><span class="s-badge s-${b}">${ic} ${b.toUpperCase()}</span></div>`;
  }

  // Reset alert
  if(showReset){
    h+=`<div class="reset-panel">
    <div style="font-weight:800;color:var(--accent);margin-bottom:4px">⚠️ Riavvio possibile</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px">
      Cassa combinata ${fe(c0+c1)} ≥ cassa iniziale ${fe(m0.cassaIniziale+m1.cassaIniziale)}.
      Puoi riavviare entrambi distribuendo la cassa come vuoi.
    </div>
    <button class="btn btn-warn btn-sm" onclick="openReset()">🔄 Riavvia Entrambi</button>
    </div>`;
  }

  // PARAMS
  h+=`<div class="card"><div class="card-lbl">Parametri Masaniello</div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Cassa (€)</label>
    <input type="number" id="m${idx}C" value="${m.params.cassa}" step="0.01" ${!isConf?'disabled':''}></div>
    <div class="ig"><label class="ilbl">N Giocate totali</label>
    <input type="number" id="m${idx}N" value="${m.params.N}" min="2" max="50" ${!isConf?'disabled':''}></div>
  </div>
  <div class="ir">
    <div class="ig"><label class="ilbl">V Vincite necessarie</label>
    <input type="number" id="m${idx}V" value="${m.params.V}" min="1" ${!isConf?'disabled':''}></div>
    <div class="ig"><label class="ilbl">Quota Media</label>
    <input type="number" id="m${idx}Q" value="${m.params.quotaMedia}" step="0.01" min="1.01" ${!isConf?'disabled':''}></div>
  </div>`;

  if(isConf){
    h+=`<button class="btn btn-acc btn-full" onclick="genMas(${idx})">⚡ Genera Masaniello</button>`;
  } else {
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:2px">
    <button class="btn btn-ghost btn-sm" onclick="rstMas(${idx})">♻️ Riconfigura</button>
    </div>`;
  }

  // Info box sul funzionamento (solo in config)
  if(isConf){
    h+=`<div class="alert alert-info" style="margin-top:10px;font-size:12px">
    <strong>Formula:</strong> Stake = Cassa ÷ C(N_rimasti, V_richieste) — Il coefficiente binomiale di Tartaglia garantisce che il budget non venga mai superato indipendentemente dall'ordine degli esiti.
    </div>`;
  }
  h+=`</div>`;

  // STATS card
  if(!isConf){
    const{best,worst}=masProj(m);
    const ns=calcStake(cassaCorrente,st.nRim,st.vRim);
    const nBin=C(st.nRim,st.vRim);

    h+=`<div class="card"><div class="card-lbl">Stato in Tempo Reale</div>
    <div class="bnum ${cassaCorrente>=m.cassaIniziale?'pos':'neg'}">${fe(cassaCorrente)}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">Cassa iniziale: ${fe(m.cassaIniziale)} | Diff: <span class="${cassaCorrente-m.cassaIniziale>=0?'pos':'neg'}">${fe(cassaCorrente-m.cassaIniziale)}</span></div>
    <div class="prog-bar" style="margin-top:10px">
      <div class="prog-fill" style="width:${Math.min(100,st.played/m.params.N*100)}%;background:${cassaCorrente>=m.cassaIniziale?'var(--pos)':'var(--accent)'}"></div>
    </div>
    <div class="g3" style="margin-top:10px">
      <div class="stat"><div class="stat-lbl">Giocate</div><div class="stat-val">${st.played}/${m.params.N}</div></div>
      <div class="stat"><div class="stat-lbl">Vinte ✅</div><div class="stat-val pos">${st.wins}</div></div>
      <div class="stat"><div class="stat-lbl">Perse ❌</div><div class="stat-val neg">${st.losses}</div></div>
    </div>`;

    if(isAtt&&st.vRim>0&&st.nRim>=st.vRim){
      h+=`<div class="sep"></div>
      <div class="card-lbl" style="margin-bottom:8px">Prossima Giocata</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Stake = Cassa ÷ C(${st.nRim},${st.vRim})</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div class="bnum acc" style="font-size:28px">${fe(ns)}</div>
        <div style="font-size:12px;color:var(--muted)">${fe(cassaCorrente)} ÷ ${nBin}</div>
      </div>
      <div style="font-size:12px;color:var(--muted)">Ancora necessari: <strong style="color:var(--text)">${st.vRim}</strong> su <strong style="color:var(--text)">${st.nRim}</strong> rimanenti</div>`;
    } else if(isAtt&&st.vRim<=0){
      h+=`<div class="sep"></div><div class="alert alert-pos" style="margin-bottom:0">🏆 Obiettivo raggiunto! Nessuna scommessa necessaria.</div>`;
    } else if(isAtt&&st.nRim<st.vRim){
      h+=`<div class="sep"></div><div class="alert alert-neg" style="margin-bottom:0">⛔ Masaniello non più recuperabile: le vincite rimanenti non bastano.</div>`;
    }

    if(isAtt&&st.vRim>0&&st.nRim>=st.vRim){
      h+=`<div class="sep"></div>
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px">Proiezione (@Q.Media ${m.params.quotaMedia})</div>
      <div class="g2">
        <div class="stat"><div class="stat-lbl">🔝 Best (win tutti)</div><div class="stat-val pos">${fe(best)}</div></div>
        <div class="stat"><div class="stat-lbl">📉 Worst (loss poi win)</div><div class="stat-val neg">${fe(worst)}</div></div>
      </div>`;
    }
    h+=`</div>`;

    // GESTIONE
    if(isAtt){
      h+=`<div class="card"><div class="card-lbl">Gestione</div>
      <div class="btn-row">
        <button class="btn btn-pos btn-sm" onclick="finMas(${idx})">✅ Finito & Trasferisci</button>
        <button class="btn btn-neg btn-sm" onclick="falMas(${idx})">❌ Segna Fallito</button>
      </div></div>`;
    }
    const hasXfer=S.budget.aggiustamenti.some(a=>a.ref==='mas_'+idx);
    if((isFin||isFal)&&!hasXfer){
      h+=`<div class="alert alert-warn">Non ancora trasferito al budget.
      <div style="margin-top:8px"><button class="btn btn-acc btn-sm" onclick="xferMas(${idx})">💸 Trasferisci ${fe(cassaCorrente)}</button></div></div>`;
    }
    if(hasXfer){h+=`<div class="alert alert-pos">✅ Cassa trasferita al budget.</div>`;}

    // EVENT LIST
    h+=`<div class="card"><div class="card-lbl">Tabella Giocate</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5">Inserisci la quota effettiva della partita (pre-filled con quota media), poi segna W o L. La previsione si aggiorna in tempo reale.</div>
    <div class="ev-list" id="evList${idx}">`;

    let simCassa=m.cassaIniziale,simWins=0;
    for(let i=0;i<m.params.N;i++){
      const ev=m.events[i];
      const isPlayed=!!ev;
      const isNextEvent=isAtt&&!isPlayed&&i===m.events.length;
      const nR=m.params.N-i,vR=m.params.V-simWins;
      const s=calcStake(simCassa,nR,vR);

      const cls=ev?(ev.esito==='W'?'ev-win':'ev-loss'):'';
      h+=`<div class="ev-item ${cls}" id="evI${idx}_${i}">`;
      h+=`<div class="ev-row">`;
      h+=`<span class="ev-num">#${i+1}</span>`;

      if(isPlayed){
        const diff=ev.esito==='W'?ev.stk*(ev.quota-1):-ev.stk;
        h+=`<span class="badge ${ev.esito==='W'?'b-win':'b-loss'}">${ev.esito}</span>`;
        h+=`<span class="ev-stake-txt" style="margin-left:4px">@${ev.quota} · Puntata ${fe(ev.stk)} · ${ev.esito==='W'?'+':'-'}${fe(Math.abs(diff))}</span>`;
      } else if(isNextEvent){
        h+=`<input class="ev-quota-inp" type="number" id="q${idx}_${i}" 
          value="${m.params.quotaMedia}" step="0.01" min="1.01"
          oninput="prevEv(${idx},${i})">`;
        h+=`<span class="ev-stake-txt" id="stk${idx}_${i}">Stake: <strong style="color:var(--accent)">${fe(s)}</strong> = ${fe(getCassa(m))} ÷ C(${nR},${vR})</span>`;
        if(vR>0&&nR>=vR){
          h+=`<div class="ev-actions">
            <button class="btn btn-pos btn-xs" onclick="regEv(${idx},${i},'W')">W</button>
            <button class="btn btn-neg btn-xs" onclick="regEv(${idx},${i},'L')">L</button>
          </div>`;
        }
      } else {
        if(!isPlayed){
          const dimTxt=vR<=0?'Non necessaria':nR<vR?'Non recuperabile':`Stake stimata: ${fe(s)}`;
          h+=`<span class="ev-stake-txt" style="color:var(--dim)">${dimTxt}</span>`;
        }
      }
      h+=`</div>`;

      // Preview row per next event
      if(isNextEvent&&vR>0&&nR>=vR){
        const qDef=m.params.quotaMedia;
        const winCassa=simCassa-s+s*qDef;
        const lossCassa=simCassa-s;
        h+=`<div class="ev-preview" id="prev${idx}_${i}">
          <span class="preview-chip chip-win">W → ${fe(winCassa)}</span>
          <span class="preview-chip chip-loss">L → ${fe(lossCassa)}</span>
          <span style="color:var(--dim);font-size:11px">@Q.Media ${qDef}</span>
        </div>`;
      }

      h+=`</div>`;

      // Update sim
      if(isPlayed){
        if(ev.esito==='W'){simCassa=simCassa-s+s*ev.quota;simWins++;}
        else{simCassa-=s;}
      }
    }
    h+=`</div></div>`;
  }

  ct.innerHTML=h;
}

// Aggiorna preview in tempo reale quando quota cambia
function prevEv(idx,i){
  const m=S.masaniello[idx];
  const q=parseFloat(document.getElementById(`q${idx}_${i}`)?.value)||m.params.quotaMedia;
  const cassa=getCassa(m);
  const st=masStatus(m);
  const s=calcStake(cassa,st.nRim,st.vRim);
  const winC=cassa-s+s*q;
  const lossC=cassa-s;
  const prevDiv=document.getElementById(`prev${idx}_${i}`);
  const stkDiv=document.getElementById(`stk${idx}_${i}`);
  if(stkDiv)stkDiv.innerHTML=`Stake: <strong style="color:var(--accent)">${fe(s)}</strong> = ${fe(cassa)} ÷ C(${st.nRim},${st.vRim})`;
  if(prevDiv)prevDiv.innerHTML=`
    <span class="preview-chip chip-win">W → ${fe(winC)}</span>
    <span class="preview-chip chip-loss">L → ${fe(lossC)}</span>
    <span style="color:var(--dim);font-size:11px">@${q}</span>`;
}

// ═══════════════════════════════════════════════════════
//  SCALATA TAB
// ═══════════════════════════════════════════════════════
function getScalaCassa(){
  let cassa=S.scalata.cassaIniziale;
  for(const s of S.scalata.steps){
    if(s.esito===null)break;
    cassa=s.cassaDopo;
  }
  return cassa;
}

function renderScalata(){
  const ct=document.getElementById('ct-sc');
  const sc=S.scalata;
  const isConf=sc.stato==='config',isAtt=sc.stato==='attivo';
  const cassaCorrente=isConf?sc.params.cassaIniziale:getScalaCassa();

  let h=`<div class="stitle">Scalata</div>`;

  if(!isConf){
    const b=sc.stato==='attivo'?'attivo':sc.stato==='finita'?'finito':'fallito';
    const ic=sc.stato==='attivo'?'🟢':sc.stato==='finita'?'✅':'❌';
    h+=`<div style="margin-bottom:10px"><span class="s-badge s-${b}">${ic} ${b.toUpperCase()}</span></div>`;
  }

  h+=`<div class="card"><div class="card-lbl">Parametri Scalata</div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Cassa Iniziale (€)</label>
    <input type="number" id="scC" value="${sc.params.cassaIniziale}" step="0.01" ${!isConf?'disabled':''}></div>
    <div class="ig"><label class="ilbl">Numero Step</label>
    <input type="number" id="scN" value="${sc.params.numStep}" min="2" max="50" ${!isConf?'disabled':''}></div>
  </div>
  <div class="ig"><label class="ilbl">Quota Media (default per ogni step)</label>
  <input type="number" id="scQ" value="${sc.params.quotaMedia}" step="0.01" min="1.01" ${!isConf?'disabled':''}></div>`;

  if(isConf){
    h+=`<button class="btn btn-acc btn-full" onclick="genSc()">⚡ Genera Scalata</button>`;
    h+=`<div class="alert alert-info" style="margin-top:10px;font-size:12px">⚠️ La cassa iniziale verrà <strong>detratta dal budget</strong> alla generazione. Il totale finale verrà aggiunto al budget quando segnerai la scalata come finita.</div>`;
  } else {
    h+=`<button class="btn btn-ghost btn-sm" onclick="rstSc()">♻️ Riconfigura</button>`;
  }
  h+=`</div>`;

  if(!isConf&&sc.steps.length>0){
    const done=sc.steps.filter(s=>s.esito!==null).length;
    const target=sc.cassaIniziale*Math.pow(sc.params.quotaMedia,sc.params.numStep);
    const mult=sc.cassaIniziale>0?cassaCorrente/sc.cassaIniziale:0;

    h+=`<div class="card"><div class="card-lbl">Stato Scalata</div>
    <div class="bnum ${cassaCorrente>=sc.cassaIniziale?'pos':'neg'}">${fe(cassaCorrente)}</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">Inizio: ${fe(sc.cassaIniziale)} | Target teorico: ${fe(target)}</div>
    <div class="prog-bar" style="margin-top:10px">
      <div class="prog-fill" style="width:${done/sc.params.numStep*100}%;background:var(--pos)"></div>
    </div>
    <div class="g3" style="margin-top:10px">
      <div class="stat"><div class="stat-lbl">Completati</div><div class="stat-val">${done}/${sc.params.numStep}</div></div>
      <div class="stat"><div class="stat-lbl">Moltiplicatore</div><div class="stat-val acc">×${mult.toFixed(2)}</div></div>
      <div class="stat"><div class="stat-lbl">Next puntata</div><div class="stat-val">${fe(cassaCorrente)}</div></div>
    </div></div>`;

    if(isAtt){
      h+=`<div class="card"><div class="card-lbl">Gestione</div>
      <div class="btn-row">
        <button class="btn btn-pos btn-sm" onclick="finSc()">✅ Finita & Trasferisci</button>
        <button class="btn btn-neg btn-sm" onclick="falSc()">❌ Fallita (Azzera)</button>
      </div></div>`;
    }
    const hasXfer=S.budget.aggiustamenti.some(a=>a.ref==='scalata_final');
    if((sc.stato==='finita'||sc.stato==='fallita')&&!hasXfer&&cassaCorrente>0){
      h+=`<div class="alert alert-warn">Non ancora trasferita.
      <div style="margin-top:8px"><button class="btn btn-acc btn-sm" onclick="xferSc()">💸 Trasferisci ${fe(cassaCorrente)}</button></div></div>`;
    }
    if(hasXfer){h+=`<div class="alert alert-pos">✅ Cassa trasferita al budget.</div>`;}

    // STEP LIST
    const firstPending=sc.steps.findIndex(s=>s.esito===null);
    h+=`<div class="card"><div class="card-lbl">Step (🏁 = Checkpoint di prelievo)</div><div class="ev-list">`;
    for(let i=0;i<sc.steps.length;i++){
      const s=sc.steps[i];
      const isNext=isAtt&&i===firstPending;
      const cls=s.esito==='W'?'ev-win':s.esito==='L'?'ev-loss':s.isCheckpoint?'ev-cp':'';
      h+=`<div class="ev-item ${cls}"><div class="ev-row">`;
      h+=`<span class="ev-num">#${i+1}</span>`;

      if(s.esito!==null){
        h+=`<span class="badge ${s.esito==='W'?'b-win':'b-loss'}">${s.esito}</span>`;
        h+=`<span class="ev-stake-txt" style="margin-left:4px">@${s.quota} · ${fe(s.cassaPrima)} → ${fe(s.cassaDopo)}${s.isCheckpoint&&s.prelievo?` <span class="cp-badge">🏁 −${fe(s.prelievo)}</span>`:''}</span>`;
      } else if(isNext){
        h+=`<input class="ev-quota-inp" type="number" id="sq${i}" value="${s.quota}" step="0.01" min="1.01" oninput="prevSt(${i})">`;
        h+=`<span class="ev-stake-txt" id="sstk${i}">Puntata: <strong style="color:var(--accent)">${fe(cassaCorrente)}</strong></span>`;
        h+=`<div class="ev-actions">
          <button class="btn btn-pos btn-xs" onclick="regSt(${i},'W')">W</button>
          <button class="btn btn-neg btn-xs" onclick="regSt(${i},'L')">L</button>
        </div>`;
      } else {
        const prevSteps=sc.steps.slice(0,i);
        const prevCassa=i===0?sc.cassaIniziale:(prevSteps.filter(s=>s.esito!==null).length>0?sc.steps[i-1]?.cassaDopo:sc.cassaIniziale);
        h+=`<span class="ev-stake-txt" style="color:var(--dim)">— in attesa —</span>`;
      }
      h+=`</div>`;

      // CP ROW for next event
      if(isNext){
        h+=`<div class="cp-row">
          <div class="tog-wrap" onclick="togCP(${i})">
            <button class="tog ${s.isCheckpoint?'on':''}"></button>
            <span style="font-size:13px;font-weight:600">🏁 Checkpoint</span>
          </div>
          ${s.isCheckpoint?`<input type="number" class="ev-quota-inp" id="cpP${i}" 
            placeholder="Prelievo €" step="0.01" value="${s.prelievo||''}"
            style="width:110px"
            oninput="S.scalata.steps[${i}].prelievo=parseFloat(this.value)||0;save();updateCPPreview(${i})">`:''}
        </div>`;

        // Checkpoint preview simulation
        if(s.isCheckpoint){
          const q=s.quota||sc.params.quotaMedia;
          const winCassa=cassaCorrente*q;
          const prel=s.prelievo||0;
          const rimanente=Math.max(0,winCassa-prel);
          h+=`<div class="cp-preview" id="cpPrev${i}">
            <strong style="color:var(--accent)">📊 Simulazione Checkpoint:</strong><br>
            Se vinci @${q}: cassa diventa <strong>${fe(winCassa)}</strong><br>
            Prelevi al budget: <strong style="color:var(--pos)">${fe(prel)}</strong><br>
            Continui la scalata con: <strong style="color:var(--accent)">${fe(rimanente)}</strong>
          </div>`;
        }
      }
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }
  ct.innerHTML=h;
}

function prevSt(i){
  const sc=S.scalata;
  const q=parseFloat(document.getElementById(`sq${i}`)?.value)||sc.params.quotaMedia;
  const cassa=getScalaCassa();
  const win=cassa*q;
  const prel=sc.steps[i]?.prelievo||0;
  const rimane=Math.max(0,win-prel);
  const el=document.getElementById(`sstk${i}`);
  if(el)el.innerHTML=`Puntata: <strong style="color:var(--accent)">${fe(cassa)}</strong>`;
  updateCPPreview(i,q);
}

function updateCPPreview(i,qOverride){
  const sc=S.scalata;
  const s=sc.steps[i];
  if(!s||!s.isCheckpoint)return;
  const q=qOverride||parseFloat(document.getElementById(`sq${i}`)?.value)||sc.params.quotaMedia;
  const cassa=getScalaCassa();
  const winC=cassa*q;
  const prel=s.prelievo||0;
  const rimane=Math.max(0,winC-prel);
  const el=document.getElementById(`cpPrev${i}`);
  if(el)el.innerHTML=`<strong style="color:var(--accent)">📊 Simulazione Checkpoint:</strong><br>
    Se vinci @${q}: cassa diventa <strong>${fe(winC)}</strong><br>
    Prelevi al budget: <strong style="color:var(--pos)">${fe(prel)}</strong><br>
    Continui la scalata con: <strong style="color:var(--accent)">${fe(rimane)}</strong>`;
}

// ═══════════════════════════════════════════════════════
//  FREE BET TAB
// ═══════════════════════════════════════════════════════
function renderFreeBet(){
  const ct=document.getElementById('ct-fb');
  const settled=S.freeBet.scommesse.filter(s=>s.esito!==null);
  const wins=settled.filter(s=>s.esito==='W');
  const losses=settled.filter(s=>s.esito==='L');
  const totStk=settled.reduce((a,s)=>a+s.puntata,0);
  const totWin=wins.reduce((a,s)=>a+s.puntata*s.quota*.9,0);
  const netFB=totWin-totStk;
  const rageAcc=wins.reduce((a,s)=>a+s.puntata*s.quota*.1,0);

  let h=`<div class="stitle">Free Bet</div>`;

  if(settled.length>0){
    h+=`<div class="card"><div class="card-lbl">Statistiche</div>
    <div class="g2">
      <div class="stat"><div class="stat-lbl">Win / Loss</div><div class="stat-val">${wins.length}W / ${losses.length}L</div></div>
      <div class="stat"><div class="stat-lbl">Net Budget</div><div class="stat-val ${netFB>=0?'pos':'neg'}">${fe(netFB)}</div></div>
    </div>
    <div class="g2" style="margin-top:8px">
      <div class="stat"><div class="stat-lbl">Rage Accumulato</div><div class="stat-val rage-c">${fe(rageAcc)}</div></div>
      <div class="stat"><div class="stat-lbl">Tot. Puntate</div><div class="stat-val">${fe(totStk)}</div></div>
    </div></div>`;
  }

  h+=`<div class="card"><div class="card-lbl">Nuova Scommessa</div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Puntata (€)</label>
    <input type="number" id="fbP" placeholder="0.00" step="0.01" min="0.01" oninput="prevFB()"></div>
    <div class="ig"><label class="ilbl">Quota</label>
    <input type="number" id="fbQ" placeholder="1.50" step="0.01" min="1.01" oninput="prevFB()"></div>
  </div>
  <div id="fbPrev" style="font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:500"></div>
  <button class="btn btn-acc btn-full" onclick="addFB()">➕ Aggiungi Scommessa</button>
  <div class="alert alert-info" style="margin-top:10px;font-size:12px">
    Se vinci: 90% della vincita lorda → Budget, 10% → 🔥 Rage Bet Fund automaticamente.
  </div>
  </div>`;

  const pending=S.freeBet.scommesse.filter(s=>s.esito===null);
  if(pending.length>0){
    h+=`<div class="card"><div class="card-lbl">In Attesa di Risultato</div>`;
    for(const s of pending.slice().reverse()){
      h+=`<div class="fb-item">
      <div class="fb-info">
        <div class="fb-title">@${s.quota} — Puntata: ${fe(s.puntata)}</div>
        <div class="fb-sub">Win lordo: ${fe(s.puntata*s.quota)} → Budget +${fe(s.puntata*s.quota*.9)} · Rage +${fe(s.puntata*s.quota*.1)}</div>
      </div>
      <div class="ev-actions">
        <button class="btn btn-pos btn-xs" onclick="setFB('${s.id}','W')">W</button>
        <button class="btn btn-neg btn-xs" onclick="setFB('${s.id}','L')">L</button>
        <button class="btn btn-ghost btn-xs" onclick="delFB('${s.id}')">🗑</button>
      </div></div>`;
    }
    h+=`</div>`;
  }

  if(settled.length>0){
    h+=`<div class="card"><div class="card-lbl">Storico</div>`;
    for(const s of settled.slice().reverse()){
      const net=s.esito==='W'?(s.puntata*s.quota*.9-s.puntata):(-s.puntata);
      h+=`<div class="fb-item">
      <div class="fb-info">
        <div class="fb-title"><span class="badge ${s.esito==='W'?'b-win':'b-loss'}">${s.esito}</span> @${s.quota} — ${fe(s.puntata)}</div>
        <div class="fb-sub">${s.esito==='W'?`Net: ${fe(net)} · Rage: +${fe(s.puntata*s.quota*.1)}`:`Persa: ${fe(net)}`} · ${fd(s.data)}</div>
      </div></div>`;
    }
    h+=`</div>`;
  }

  if(S.freeBet.scommesse.length===0){
    h+=`<div class="empty"><div style="font-size:32px;margin-bottom:8px">🎲</div>Nessuna free bet registrata ancora</div>`;
  }
  h+=`<div style="height:16px"></div>`;
  ct.innerHTML=h;
}

// ═══════════════════════════════════════════════════════
//  ACTIONS - BUDGET
// ═══════════════════════════════════════════════════════
function setBud(){S.budget.iniziale=parseFloat(document.getElementById('budInp').value)||0;save();renderAll();}

function xferRage(){
  const v=parseFloat(document.getElementById('rageInp').value)||0;
  const r=rageSaldo();
  if(v<=0||v>r+0.001){alert('Importo non valido (max '+fe(r)+')');return;}
  S.rageBet.saldo-=v;
  S.rageBet.storico.push({importo:v,data:new Date().toISOString(),nota:'Trasferimento Rage Bet'});
  S.budget.aggiustamenti.push({id:uid(),tipo:'rage',importo:v,data:new Date().toISOString(),descrizione:'💀 Rage Bet → Budget',ref:'rage_'+Date.now()});
  save();renderAll();
}

// ═══════════════════════════════════════════════════════
//  ACTIONS - MASANIELLO
// ═══════════════════════════════════════════════════════
function genMas(idx){
  const m=S.masaniello[idx];
  const c=parseFloat(document.getElementById('m'+idx+'C').value)||50;
  const N=parseInt(document.getElementById('m'+idx+'N').value)||10;
  const V=parseInt(document.getElementById('m'+idx+'V').value)||6;
  const Q=parseFloat(document.getElementById('m'+idx+'Q').value)||1.80;
  if(V>N){alert('V non può essere maggiore di N');return;}
  if(V<=0||N<=0){alert('Parametri non validi');return;}
  m.params={cassa:c,N,V,quotaMedia:Q};
  m.cassaIniziale=c;m.events=[];m.stato='attivo';
  save();renderAll();
}

function rstMas(idx){
  if(!confirm('Resettare il '+S.masaniello[idx].nome+'? Tutti i progressi verranno persi.'))return;
  const m=S.masaniello[idx];
  m.stato='config';m.events=[];m.cassaIniziale=m.params.cassa;
  // Remove any transfer for this masaniello
  S.budget.aggiustamenti=S.budget.aggiustamenti.filter(a=>a.ref!=='mas_'+idx);
  save();renderAll();
}

function regEv(idx,evIdx,esito){
  const m=S.masaniello[idx];
  if(m.events.length!==evIdx){alert('Errore: giocata fuori sequenza');return;}
  const qEl=document.getElementById(`q${idx}_${evIdx}`);
  const quota=parseFloat(qEl?.value)||m.params.quotaMedia;
  if(quota<=1){alert('Inserisci una quota valida (>1)');return;}

  const cassa=getCassa(m);
  const st=masStatus(m);
  const s=calcStake(cassa,st.nRim,st.vRim);

  if(st.vRim<=0){alert('Hai già raggiunto il numero di vincite!');return;}
  if(st.nRim<st.vRim){alert('Masaniello non più recuperabile.');return;}
  if(s<0.001){alert('Stake troppo bassa. Verifica i parametri.');return;}

  const cassaAfter=esito==='W'?(cassa-s+s*quota):(cassa-s);
  m.events.push({esito,quota,stk:s,cassaPrima:cassa,cassaDopo:cassaAfter,data:new Date().toISOString()});

  const st2=masStatus(m);
  if(st2.vRim<=0)m.stato='finito';
  else if(st2.nRim<st2.vRim)m.stato='fallito';
  else if(st2.played>=m.params.N)m.stato=(st2.vRim<=0)?'finito':'fallito';

  save();renderAll();
}

function finMas(idx){
  if(!confirm('Segnare come finito e trasferire al budget?'))return;
  S.masaniello[idx].stato='finito';
  xferMas(idx);
}
function falMas(idx){
  if(!confirm('Segnare come fallito?'))return;
  S.masaniello[idx].stato='fallito';
  save();renderAll();
}
function xferMas(idx){
  const cassa=getCassa(S.masaniello[idx]);
  if(S.budget.aggiustamenti.some(a=>a.ref==='mas_'+idx)){alert('Già trasferito!');return;}
  S.budget.aggiustamenti.push({id:uid(),tipo:'masaniello',importo:cassa,data:new Date().toISOString(),descrizione:S.masaniello[idx].nome+' → Budget',ref:'mas_'+idx});
  save();renderAll();
}

// ═══════════════════════════════════════════════════════
//  MODAL RESET MASANIELLO
// ═══════════════════════════════════════════════════════
function openReset(){
  const m0=S.masaniello[0],m1=S.masaniello[1];
  const c0=getCassa(m0),c1=getCassa(m1);
  const tot=c0+c1;
  const o=document.createElement('div');
  o.className='overlay';o.id='rOvl';
  o.innerHTML=`<div class="modal">
  <div class="modal-title">🔄 Riavvia Entrambi i Masaniello</div>
  <div class="alert alert-warn" style="margin-bottom:12px">Cassa totale disponibile: <strong>${fe(tot)}</strong><br>Distribuisci tra i due e aggiusta i parametri.</div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Cassa Mas 1 (€)</label><input type="number" id="r0" value="${(tot/2).toFixed(2)}" step="0.01" oninput="rChk(${tot})"></div>
    <div class="ig"><label class="ilbl">Cassa Mas 2 (€)</label><input type="number" id="r1" value="${(tot/2).toFixed(2)}" step="0.01" oninput="rChk(${tot})"></div>
  </div>
  <div id="rChkD" style="font-size:13px;margin-bottom:12px;font-weight:600"></div>
  <div class="ir">
    <div class="ig"><label class="ilbl">N Mas 1 / V Mas 1</label><input type="number" id="rN0" value="${m0.params.N}"></div>
    <div class="ig" style="padding-top:21px"><input type="number" id="rV0" value="${m0.params.V}"></div>
  </div>
  <div class="ir">
    <div class="ig"><label class="ilbl">N Mas 2 / V Mas 2</label><input type="number" id="rN1" value="${m1.params.N}"></div>
    <div class="ig" style="padding-top:21px"><input type="number" id="rV1" value="${m1.params.V}"></div>
  </div>
  <div class="ir">
    <div class="ig"><label class="ilbl">Quota Media Mas 1</label><input type="number" id="rQ0" value="${m0.params.quotaMedia}" step="0.01"></div>
    <div class="ig"><label class="ilbl">Quota Media Mas 2</label><input type="number" id="rQ1" value="${m1.params.quotaMedia}" step="0.01"></div>
  </div>
  <div class="btn-row" style="margin-top:6px">
    <button class="btn btn-acc btn-full" onclick="confReset(${tot})">✅ Riavvia</button>
    <button class="btn btn-ghost" onclick="document.getElementById('rOvl').remove()">Annulla</button>
  </div></div>`;
  document.body.appendChild(o);rChk(tot);
}
function rChk(tot){
  const v0=parseFloat(document.getElementById('r0')?.value)||0,v1=parseFloat(document.getElementById('r1')?.value)||0;
  const d=document.getElementById('rChkD');if(!d)return;
  const diff=tot-v0-v1;
  d.textContent=`Totale: ${fe(v0+v1)} / ${fe(tot)} — Differenza: ${fe(Math.abs(diff))}`;
  d.style.color=Math.abs(diff)<0.01?'var(--pos)':'var(--neg)';
}
function confReset(tot){
  const c0=parseFloat(document.getElementById('r0').value)||0;
  const c1=parseFloat(document.getElementById('r1').value)||0;
  if(Math.abs(tot-c0-c1)>0.02&&!confirm(`Le casse (${fe(c0+c1)}) non corrispondono al totale (${fe(tot)}). Continuare?`))return;
  const N0=+document.getElementById('rN0').value,V0=+document.getElementById('rV0').value,Q0=+document.getElementById('rQ0').value;
  const N1=+document.getElementById('rN1').value,V1=+document.getElementById('rV1').value,Q1=+document.getElementById('rQ1').value;
  if(V0>N0||V1>N1){alert('V non può essere maggiore di N');return;}
  [S.masaniello[0],S.masaniello[1]].forEach((m,i)=>{
    const c=i===0?c0:c1,N=i===0?N0:N1,V=i===0?V0:V1,Q=i===0?Q0:Q1;
    m.params={cassa:c,N,V,quotaMedia:Q};m.cassaIniziale=c;m.events=[];m.stato='attivo';
    S.budget.aggiustamenti=S.budget.aggiustamenti.filter(a=>a.ref!=='mas_'+i);
  });
  document.getElementById('rOvl').remove();save();renderAll();
}

// ═══════════════════════════════════════════════════════
//  ACTIONS - SCALATA
// ═══════════════════════════════════════════════════════
function genSc(){
  const c=parseFloat(document.getElementById('scC').value)||10;
  const n=parseInt(document.getElementById('scN').value)||10;
  const q=parseFloat(document.getElementById('scQ').value)||1.50;
  if(c<=0){alert('Cassa non valida');return;}
  // Detrai la cassa dal budget
  if(!S.budget.aggiustamenti.some(a=>a.ref==='scalata_gen')){
    S.budget.aggiustamenti.push({id:uid(),tipo:'scalata',importo:-c,data:new Date().toISOString(),descrizione:'📈 Scalata avviata (−cassa)',ref:'scalata_gen'});
  }
  S.scalata.params={cassaIniziale:c,numStep:n,quotaMedia:q};
  S.scalata.cassaIniziale=c;
  S.scalata.stato='attivo';
  S.scalata.steps=Array.from({length:n},(_,i)=>({id:i,quota:q,esito:null,isCheckpoint:false,prelievo:0,cassaPrima:null,cassaDopo:null}));
  save();renderAll();
}
function rstSc(){
  if(!confirm('Resettare la Scalata? I progressi verranno persi.'))return;
  // Rimuovi la detrazione se non ha ancora prodotto risultati
  const hadFinal=S.budget.aggiustamenti.some(a=>a.ref==='scalata_final');
  if(!hadFinal){
    // Rimborso: aggiungi il contrario della detrazione iniziale
    const genAdj=S.budget.aggiustamenti.find(a=>a.ref==='scalata_gen');
    if(genAdj){
      S.budget.aggiustamenti.push({id:uid(),tipo:'scalata',importo:S.scalata.cassaIniziale,data:new Date().toISOString(),descrizione:'📈 Scalata annullata (rimborso)',ref:'scalata_gen_refund'});
    }
  }
  S.budget.aggiustamenti=S.budget.aggiustamenti.filter(a=>a.ref!=='scalata_gen'&&a.ref!=='scalata_final'&&a.ref!=='scalata_gen_refund');
  S.scalata.stato='config';S.scalata.steps=[];
  save();renderAll();
}
function togCP(i){
  S.scalata.steps[i].isCheckpoint=!S.scalata.steps[i].isCheckpoint;
  if(!S.scalata.steps[i].isCheckpoint)S.scalata.steps[i].prelievo=0;
  save();renderScalata();
}
function regSt(i,esito){
  const sc=S.scalata,s=sc.steps[i];
  const q=parseFloat(document.getElementById(`sq${i}`)?.value)||sc.params.quotaMedia;
  const cassa=getScalaCassa();
  s.cassaPrima=cassa;s.quota=q;
  if(esito==='W'){
    const winC=cassa*q;
    let dopo=winC;
    if(s.isCheckpoint&&s.prelievo>0){
      const p=Math.min(s.prelievo,winC);
      dopo=Math.max(0,winC-p);
      S.budget.aggiustamenti.push({id:uid(),tipo:'scalata',importo:p,data:new Date().toISOString(),descrizione:`🏁 Scalata Checkpoint #${i+1}`,ref:'scalata_cp_'+i});
    }
    s.cassaDopo=dopo;
  }else{s.cassaDopo=0;sc.stato='fallita';}
  s.esito=esito;
  if(esito==='W'&&i===sc.steps.length-1)sc.stato='finita';
  save();renderAll();
}
function finSc(){if(!confirm('Segnare come finita e trasferire?'))return;S.scalata.stato='finita';xferSc();}
function falSc(){if(!confirm('Segnare come fallita? Cassa → €0'))return;S.scalata.stato='fallita';save();renderAll();}
function xferSc(){
  const c=getScalaCassa();
  if(S.budget.aggiustamenti.some(a=>a.ref==='scalata_final')){alert('Già trasferita!');return;}
  S.budget.aggiustamenti.push({id:uid(),tipo:'scalata',importo:c,data:new Date().toISOString(),descrizione:'Scalata → Budget',ref:'scalata_final'});
  save();renderAll();
}

// ═══════════════════════════════════════════════════════
//  ACTIONS - FREE BET
// ═══════════════════════════════════════════════════════
function prevFB(){
  const p=parseFloat(document.getElementById('fbP')?.value)||0;
  const q=parseFloat(document.getElementById('fbQ')?.value)||0;
  const el=document.getElementById('fbPrev');
  if(el&&p>0&&q>1){
    const l=p*q;
    el.innerHTML=`Win lordo: <strong style="color:var(--text)">${fe(l)}</strong> → <span class="pos">${fe(l*.9)}</span> al budget · <span class="rage-c">${fe(l*.1)}</span> al Rage Bet`;
  }else if(el)el.textContent='';
}
function addFB(){
  const p=parseFloat(document.getElementById('fbP').value)||0;
  const q=parseFloat(document.getElementById('fbQ').value)||0;
  if(!p||p<=0||!q||q<=1){alert('Inserisci puntata valida e quota > 1');return;}
  S.freeBet.scommesse.push({id:uid(),puntata:p,quota:q,esito:null,data:new Date().toISOString()});
  save();renderAll();
}
function setFB(id,esito){
  const s=S.freeBet.scommesse.find(s=>s.id===id);if(!s)return;
  s.esito=esito;s.settledAt=new Date().toISOString();
  save();renderAll();
}
function delFB(id){
  if(!confirm('Eliminare questa scommessa?'))return;
  S.freeBet.scommesse=S.freeBet.scommesse.filter(s=>s.id!==id);
  save();renderAll();
}

// ═══════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ═══════════════════════════════════════════════════════
function expJSON(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download=`bethub_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function impJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const p=JSON.parse(ev.target.result);if(!p.budget)throw new Error('File non valido');if(confirm('Sovrascrivere tutti i dati correnti?')){S=p;save();renderAll();}}catch(err){alert('Errore: '+err.message);}};
  r.readAsText(f);e.target.value='';
}
function expCSV(){
  let c='Sezione,N,Puntata,Quota,Esito,CassaDopo,Data\n';
  S.masaniello.forEach((m,i)=>m.events.forEach((ev,j)=>{c+=`Masaniello ${i+1},${j+1},${ev.stk?.toFixed(2)||''},${ev.quota},${ev.esito},${ev.cassaDopo?.toFixed(2)||''},${ev.data||''}\n`;}));
  S.scalata.steps.forEach((s,i)=>{if(s.esito)c+=`Scalata,${i+1},${s.cassaPrima?.toFixed(2)||''},${s.quota},${s.esito},${s.cassaDopo?.toFixed(2)||''},\n`;});
  S.freeBet.scommesse.forEach(s=>{if(s.esito){const n=s.esito==='W'?(s.puntata*s.quota*.9-s.puntata).toFixed(2):(-s.puntata).toFixed(2);c+=`FreeBet,,${s.puntata.toFixed(2)},${s.quota},${s.esito},${n},${s.data||''}\n`;}});
  const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`bethub_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

function renderAll(){
  renderHeader();
  if(activeTab==='bud')renderBudget();
  if(activeTab==='m1')renderMas(0);
  if(activeTab==='m2')renderMas(1);
  if(activeTab==='sc')renderScalata();
  if(activeTab==='fb')renderFreeBet();
}

load();renderAll();
